              confirmation:
                text: |
                  [[[
                    if (entity.state === 'locked')
                      return 'Are you sure you want to unlock the lock?';
                    else if (entity.state === 'unlocked')
                      return 'Are you sure you want to lock the lock?';
                    else
                      return 'Lock is offline.';
                  ]]]
              action: perform-action
