computer_apps:
  card:
    type: custom:vertical-stack-in-card
    horizontal: true
    card_mod:
      style: |
        ha-card {
          --ha-card-border-width: 0;
          --ha-card-box-shadow: none;
        }
    cards:
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.[[computer]]_app_bigbox
            state_not: unavailable
          - condition: state
            entity: sensor.[[computer]]_app_bigbox
            state_not: unknown
        card:
          type: custom:mushroom-template-card
          entity: sensor.[[computer]]_app_bigbox
          vertical: true
          icon: local:bigbox
          color: '{{ iif(int(states(entity), 0) > 0, "green", "grey") }}'
          features_position: bottom
          tap_action:
            action: none
          icon_tap_action:
            action: none
          icon_hold_action:
            action: call-service
