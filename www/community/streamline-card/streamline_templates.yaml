computer_power:
  card:
    type: custom:vertical-stack-in-card
    horizontal: true
    card_mod:
      style: |
        ha-card {
          --ha-card-border-width: 0;
          --ha-card-box-shadow: none;
        }
    cards:
      - type: conditional
        conditions:
          - entity: binary_sensor.[[computer]]_connected
            state: 'off'
        card:
          type: custom:mushroom-template-card
          entity: switch.[[computer]]
          primary: Power
          icon: mdi:power-off
          color: red
          features_position: bottom
          tap_action:
            action: none
          icon_tap_action:
            action: none
          icon_hold_action:
            action: call-service
            service: switch.toggle
            target:
              entity_id: switch.[[computer]]
          card_mod:
            style:
              ha-tile-icon$: |
                .container {
                  /* Adjust icon size */
                  --mdc-icon-size: 28px !important;
                  width: 40px !important;
                  height: 40px !important;
                  border-radius: 20px !important;
                }
      - type: conditional
        conditions:
          - entity: binary_sensor.[[computer]]_connected
            state: 'on'
        card:
          type: custom:mushroom-template-card
          entity: switch.[[computer]]
          vertical: true
          icon: mdi:power
          color: green
          features_position: bottom
          tap_action:
            action: none
          icon_tap_action:
            action: none
          icon_hold_action:
            action: call-service
            service: switch.toggle
            target:
              entity_id: switch.[[computer]]
          card_mod:
            style:
              ha-tile-icon$: |
                .container {
                  /* Adjust icon size */
                  --mdc-icon-size: 28px !important;
                  width: 40px !important;
                  height: 40px !important;
                  border-radius: 20px !important;
                }
      - type: conditional
        conditions:
          - entity: binary_sensor.[[computer]]_connected
            state: 'on'
          - entity: button.[[computer]]_lock
            state_not: unavailable
