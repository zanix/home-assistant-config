door_card:
  card:
    type: custom:mushroom-template-card
    entity: '[[entity]]'
    primary: '[[name]]'
    secondary: >-
      {% from "util.jinja" import nominal_change_history %} {{
      state_translated(entity) }} ⸱ {{ nominal_change_history(entity) }}
    icon: '[[icon]]{{ "-open" if is_state(entity, "on") }}'
    color: '{{ iif(is_state(entity, "on"), "red", "green") }}'
    features_position: bottom
    tap_action:
      action: more-info
    icon_tap_action:
      action: fire-dom-event
      browser_mod:
        service: browser_mod.more_info
        data:
          entity: '[[battery_entity]]'
    card_mod:
      style:
        ha-tile-icon$: |
          {% if int(states("[[battery_entity]]"), 0) <= 50 %}
          {% from "util.jinja" import battery_color %}
          .container {
            /* Radial progress bar */
            background:
              radial-gradient(var(--card-background-color) 60%, transparent calc(60% + 1px)),
              conic-gradient(var(--{{ battery_color("[[battery_entity]]") }}-color) {{ states("[[battery_entity]]") }}% 0%, var(--card-background-color) 0% 100%
            );
          }
          {% endif %}
door_lock_card:
  card:
    type: custom:vertical-stack-in-card
    cards:
      - type: custom:mushroom-template-card
        entity: '[[entity]]'
        primary: '[[name]]'
        secondary: |-
          {% from "util.jinja" import nominal_change_history %}
          {% if is_state(entity, "on") -%}
            Open
          {% elif is_state("[[lock_entity]]", "unlocked") -%}
            Unlocked
          {% elif is_state("[[lock_entity]]", "locked") -%}
            Locked
          {% else -%}
            Unknown
          {% endif -%} ⸱ {{ nominal_change_history(entity) }}
        icon: >-
          {% if is_state(entity, "on") %}
            mdi:door-open
          {% elif is_state("[[lock_entity]]", "unlocked") and is_state(entity,
          "off") %}
            mdi:door-closed
          {% elif is_state("[[lock_entity]]", "locked") and is_state(entity,
          "off") %}
            mdi:door-closed-lock
          {% else %}
            mdi:help-circle
          {% endif %}
        color: >-
          {% if is_state(entity, "on") %}
            red
          {% elif is_state("[[lock_entity]]", "unlocked") and is_state(entity,
          "off") %}
            amber
          {% elif is_state("[[lock_entity]]", "locked") and is_state(entity,
          "off") %}
            green
          {% else %}
            grey
          {% endif %}
        features_position: bottom
        tap_action:
          action: more-info
        icon_tap_action:
          action: fire-dom-event
          browser_mod:
            data:
              entity: '[[battery_entity]]'
            service: browser_mod.more_info
        card_mod:
          style:
            ha-tile-icon$: |
              {% if int(states("[[battery_entity]]"), 0) <= 50 %}
              {% from "util.jinja" import battery_color %}
              .container {
                /* Radial progress bar */
                background:
                  radial-gradient(var(--card-background-color) 60%, transparent calc(60% + 1px)),
                  conic-gradient(var(--{{ battery_color("[[battery_entity]]") }}-color) {{ states("[[battery_entity]]") }}% 0%, var(--card-background-color) 0% 100%
                );
              }
              {% endif %}
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 65px auto
          grid-template-rows: auto
          margin: 0 -2px -10px -2px
          padding: 0
        cards:
          - type: custom:mushroom-template-card
            entity: '[[lock_battery_entity]]'
            icon: mdi:lock-smart
            color: grey
            badge_icon: >-
              {% if int(states("[[lock_battery_entity]]"), 0) <= 50 %} {% from
              "util.jinja" import battery_icon %} {{
              battery_icon(states(entity)) }} {% endif %}
            badge_color: >-
              {% from "util.jinja" import battery_color %} {{
              battery_color(entity) }}
            tap_action:
              action: none
            icon_tap_action:
              action: navigate
              navigation_path: '[[lock_path]]'
            icon_hold_action:
              action: fire-dom-event
              browser_mod:
                data:
                  entity: '[[lock_battery_entity]]'
                service: browser_mod.more_info
            card_mod:
              style:
                .: |
                  ha-card {
                    --icon-size: 42px;
                    --ha-card-box-shadow: none;
                    --ha-card-border-width: 0;
                  }
                ha-tile-icon$: >
                  {% set timer = "[[lock_timer_entity]]" %} {% if
                  state_attr(timer, "finishes_at") %} {% set remaining =
                  (as_datetime(state_attr(timer, "finishes_at")) -
                  now()).total_seconds() | int %} {% set duration =
                    (state_attr(timer, "duration").split(":")[0] | int * 60 * 60)
                    + (state_attr(timer, "duration").split(":")[1] | int * 60)
                    + (state_attr(timer, "duration").split(":")[2] | int)
                  %} .container {
                    /* Radial progress bar */
                    background:
                      radial-gradient(var(--card-background-color) 60%, transparent calc(60% + 1px)),
                      conic-gradient(var(--red-color) {{ (remaining / duration * 100) | round() }}% 0%, var(--card-background-color) 0% 100%);
                  } {%- endif -%}
          - type: custom:mushroom-lock-card
            entity: '[[lock_entity]]'
            primary_info: none
            secondary_info: none
            icon_type: none
            card_mod:
              style:
                .: |
                  ha-card {
                    --ha-card-box-shadow: none;
                    --ha-card-border-width: 0;
                    background: none;
                  }
                mushroom-lock-buttons-control$:
                  mushroom-button:nth-child(1)$: |
                    .button {
                      --bg-color: rgba(var(--rgb-disabled), 0.2);
                    }
fan_group:
  default:
    - style: '--ha-card-background: none;'
  card:
    type: custom:vertical-stack-in-card
    card_mod:
      style: |
        ha-card {
          [[style]]
          --ha-card-border-width: 0;
        }
    cards:
      - type: tile
        entity: '[[entity]]'
        features_position: inline
        vertical: false
        hide_state: true
        tap_action:
          action: toggle
        icon_tap_action:
          action: none
        card_mod:
          style:
            .: |
              ha-card {
                {% if is_state(config.entity, "on") %}
                background: color-mix(in srgb, var(--tile-color), transparent 95%)
                {% endif %}
              }
              ha-tile-icon {
                {% if is_state(config.entity, 'on') %}
                  {% set speed = state_attr(config.entity, 'percentage') %}
                  {% set color = {
                    33: "green",
                    66: "orange",
                    100: "red"
                  }[speed] %}
                {% else %}
                  {% set color = "grey" %}
                {% endif %}
                --tile-color: var(--{{ color }}-color);
              }
              ha-state-icon {
                {% if is_state(config.entity, 'on') %}
                  {% set speed = state_attr(config.entity, 'percentage') %}
                  animation: {{ (2 - (speed / 100)) | round(2) }}s rotation linear infinite;
                {% endif %}
              }
              @keyframes rotation {
                0% {transform: rotate(0deg);}
                100% {transform: rotate(360deg);}
              }
      - type: custom:auto-entities
        card:
          type: custom:layout-card
          cards: []
          layout_type: masonry
        sort:
          method: friendly_name
        filter:
          include:
            - group: '[[entity]]'
              options:
                type: tile
                hide_state: true
                features_position: inline
                features:
                  - type: fan-speed
                card_mod:
                  style:
                    .: |
                      ha-card {
                        --ha-card-border-width: 0;
                        --ha-card-box-shadow: none;
                      }
                      ha-tile-icon {
                        {% if is_state(config.entity, 'on') %}
                          {% set speed = state_attr(config.entity, 'percentage') %}
                          {% set color = {
                            33: "green",
                            66: "orange",
                            100: "red"
                          }[speed] %}
                        {% else %}
                          {% set color = "grey" %}
                        {% endif %}
                        --tile-color: var(--{{ color }}-color);
                      }
                      ha-state-icon {
                        {% if is_state(config.entity, 'on') %}
                          {% set speed = state_attr(config.entity, 'percentage') %}
                          animation: {{ (2 - (speed / 100)) | round(2) }}s rotation linear infinite;
                        {% endif %}
                      }
                      @keyframes rotation {
                        0% {transform: rotate(0deg);}
                        100% {transform: rotate(360deg);}
                      }
