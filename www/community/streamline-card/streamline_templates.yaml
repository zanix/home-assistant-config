          icon: >-
            {% from "util.jinja" import wifi_icon %} {{
            wifi_icon("sensor.[[phone_base]]_[[person]]_wi_fi_signal_strength",
            "sensor.[[phone_base]]_[[person]]_wi_fi_connection") }}
          tap_action:
            action: more-info
        - type: template
          entity: sensor.[[phone_base]]_[[person]]_battery_level
          icon: >-
            {% from "util.jinja" import battery_icon %} {{
            battery_icon(states(entity),
            is_charging=is_state("sensor.[[phone_base]]_[[person]]_battery_state",
            "charging"),
            is_wireless=is_state("sensor.[[phone_base]]_[[person]]_charger_type",
            "wireless")) }}
          icon_color: >-
            {% from "util.jinja" import battery_color %} {% if
            is_state("sensor.[[phone_base]]_[[person]]_battery_state",
            "charging") %}
              light-blue
            {% else %}
              {{ battery_color(entity) }}
            {% endif %}
          tap_action:
            action: more-info
      chips:
        - type: conditional
          conditions:
            - entity: sensor.[[phone_base]]_[[person]]_do_not_disturb_sensor
              state_not: unavailable
            - entity: sensor.[[phone_base]]_[[person]]_do_not_disturb_sensor
              state_not: unknown
            - entity: sensor.[[phone_base]]_[[person]]_do_not_disturb_sensor
              state_not: 'off'
          chip:
            type: template
            entity: sensor.[[phone_base]]_[[person]]_do_not_disturb_sensor
            icon: mdi:minus-circle
            icon_color: amber
            tap_action:
              action: none
        - type: conditional
          conditions:
            - entity: person.[[person]]
              state_not: home
            - entity: person.[[person]]
              state_not: unavailable
            - entity: person.[[person]]
              state_not: unknown
          chip:
            type: template
            entity: sensor.home_[[person]]_direction_of_travel
            icon: >-
              {% if int(states("sensor.home_[[person]]_distance"), 0) >=
              state_attr("zone.home", "radius") * 3.281 %}
                {% if is_state(entity, "towards") %}
                  mdi:map-marker-left
                {% elif is_state(entity, "away_from") %}
                  mdi:map-marker-right
                {% else %}
                  mdi:map-marker-distance
                {% endif %}
              {% endif %}
            icon_color: |-
              {% if is_state(entity, "towards") %}
                green
              {% elif is_state(entity, "away_from") %}
                orange
              {% else %}
                grey
              {% endif %}
            layout: vertical
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
            card_mod:
              style:
                .: >
                  {% if int(states("sensor.home_[[person]]_distance"), 0) >=
                  state_attr("zone.home", "radius") * 3.281  %}
                    {% set color = "grey" %}
                    {% if is_state(config.entity, "towards") %}
                      {% set color = "green" %}
                    {% elif is_state(config.entity, "away_from") %}
                      {% set color = "orange" %}
                    {% endif %}
                  ha-card:after {
                    content: "{{ ((states("sensor.home_[[person]]_distance") | float) / 5280) | round(1) }}mi";
                    position: absolute;
                    color: var(--{{ color }}-color);
                    font-weight: bolder;
                    top: -2px;
                    right: 2px;
                    font-size: 12px;
                  }

                  {% endif %}
    extra_styles: |
      [[[
        let color = '';
        if (entity.state === 'not_home') color = 'var(--red-color) 30%';
        else if (entity.state.includes(['unknown', 'unavailable'])) color = 'var(--grey-color) 30%';
        else if (entity.state !== 'home') color = 'var(--blue-color) 30%';
        else if (entity.state === 'home') color = 'var(--ha-card-background) 30%';
        return `
        @media (hover: hover) {
          ha-card:hover {
            background: color-mix(in srgb, ${color}, transparent) !important;
          }
        }
        `
      ]]]
