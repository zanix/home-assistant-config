            action: none
          icon_tap_action:
            action: none
          icon_hold_action:
            action: call-service
            service: button.press
            target:
              entity_id: button.[[computer]]_suspend
          card_mod:
            style:
              ha-tile-icon$: |
                .container {
                  /* Adjust icon size */
                  --mdc-icon-size: 28px !important;
                  width: 40px !important;
                  height: 40px !important;
                  border-radius: 20px !important;
                }
      - type: conditional
        conditions:
