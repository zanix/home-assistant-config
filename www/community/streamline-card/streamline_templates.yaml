uptime_card:
  default:
    - name: Uptime
    - icon: mdi:cloud-arrow-up-outline
    - ko_icon: mdi:exclamation-thick
    - ok: 'on'
    - ko: 'off'
    - hours: 72
    - amount: 72
    - alias_ok: Online
    - alias_ko: Offline
  card:
    type: custom:uptime-card
    entity: '[[entity]]'
    title_template: '[[name]]'
    icon: '[[icon]]'
    ko_icon: '[[ko_icon]]'
    ok: '[[ok]]'
    ko: '[[ko]]'
    hours_to_show: '[[hours]]'
    update_interval: 30
    init:
      animation: raise
    alias:
      ok: '[[alias_ok]]'
      ko: '[[alias_ko]]'
    icon_adaptive_color: true
    title_adaptive_color: true
    color:
      ok: var(--green-color)
      ko: var(--dark-grey-color)
      half: var(--light-green-color)
      none: var(--black-color)
    bar:
      spacing: 1
      height: 20
      round: 0
      amount: '[[amount]]'
    show:
      average: true
      status: true
      title: true
      header: true
      icon: true
      timeline: true
      footer: true
    alignment:
      status: spaced
      header: left
      icon_first: true
    tap_action:
      action: more-info
    tooltip:
      animation: true
      hour24: false
updates_list_arch:
  card:
    type: markdown
    card_mod:
      style:
        .: |
          ha-card {
            --ha-card-background: none;
            --ha-card-border-width: 0;
            --ha-card-box-shadow: none;
          }
        ha-markdown $: |
          td {
            overflow-wrap: break-word;
            word-break: break-all;
          }
    content: >-
      ### {{ state_attr("[[entity]]", "friendly_name") }}: {{
      states("[[entity]]") }}

      <table markdown="1"> {% for update in state_attr("[[entity]]",
      "updates") %}
        {%- set parts = update.split(" ") -%}
        {%- set name = parts[0] -%}
        {%- set previous_version = parts[1] -%}
        {%- set update_version = parts[3] -%}
      <tr><td><strong><a href="https://archlinux.org/packages/?q={{ name
      }}">{{ name }}</a></strong></td><td>{{ previous_version }} ➜ {{
      update_version }}</td></tr> {% endfor %} </table>
updates_list_debian:
  card:
    type: markdown
    card_mod:
      style:
        .: |
          ha-card {
            --ha-card-background: none;
            --ha-card-border-width: 0;
            --ha-card-box-shadow: none;
          }
        ha-markdown $: |
          td {
            overflow-wrap: break-word;
            word-break: break-all;
          }
    content: >-
      ### {{ state_attr("[[entity]]", "friendly_name") }}: {{
      states("[[entity]]") }}

      <ul markdown="1"> {% for update in state_attr("[[entity]]", "updates")
      %} <li><a href="https://packages.debian.org/search?keywords={{ update
      }}&searchon=names&suite=stable&section=all">{{ update }}</a></li> {%
      endfor %} </ul>
updates_list_windows:
  card:
    type: markdown
    card_mod:
      style: |
        ha-card {
          --ha-card-background: none;
          --ha-card-border-width: 0;
          --ha-card-box-shadow: none;
        }
    content: >-
      ### {{ state_attr("[[entity]]", "friendly_name") }}:
      {{states("[[entity]]") }}

      {% for item in state_attr("[[entity]]", "WindowsUpdates") %} __{{
      item.Title }}__ <blockquote> {{ item.Description }}<br> <a href="{{
      item.SupportUrl }}">Support Link</a>{% if item.KbArticleIDs %} | <a
      href="https://catalog.update.microsoft.com/Search.aspx?q={{
      item.KbArticleIDs[0] }}">KB Article</a>{% endif %} </blockquote> {%
      endfor %}

# Locks
lock_card:
  default:
    - lock: front_door
    - slot: '1'
  card:
    type: vertical-stack
    cards:
      - type: heading
        heading: Code [[slot]]
        heading_style: title
        badges:
          - type: custom:uix-forge
            forge:
              mold: badge
              sparks:
                - type: tooltip
                  content: Parent Override Enabled
            element:
              type: entity
              show_state: false
              show_icon: true
              icon: mdi:directions-fork
              color: deep-orange
              entity: switch.[[lock]]_code_slot_[[slot]]_override_parent
              visibility:
                - condition: state
                  entity: switch.[[lock]]_code_slot_[[slot]]_override_parent
                  state: 'on'
          - type: custom:uix-forge
            forge:
              mold: badge
              sparks:
                - type: tooltip
                  content: Number of Uses Limit Enabled
            element:
              type: entity
              show_state: false
              show_icon: true
              icon: mdi:key-star
              color: green
              entity: switch.[[lock]]_code_slot_[[slot]]_limit_by_number_of_uses
              visibility:
                - condition: state
                  entity: switch.[[lock]]_code_slot_[[slot]]_limit_by_number_of_uses
                  state: 'on'
          - type: custom:uix-forge
            forge:
              mold: badge
              sparks:
                - type: tooltip
                  content: Date Range Limits Enabled
            element:
              type: entity
              show_state: false
              show_icon: true
              icon: mdi:calendar-week
              color: light-blue
              entity: switch.[[lock]]_code_slot_[[slot]]_use_date_range_limits
              visibility:
                - condition: state
                  entity: switch.[[lock]]_code_slot_[[slot]]_use_date_range_limits
                  state: 'on'
          - type: custom:uix-forge
            forge:
              mold: badge
              sparks:
                - type: tooltip
                  content: Day of Week Limits Enabled
            element:
              type: entity
              show_state: false
              show_icon: true
              icon: mdi:calendar-range
              color: amber
              entity: switch.[[lock]]_code_slot_[[slot]]_use_day_of_week_limits
              visibility:
                - condition: state
                  entity: switch.[[lock]]_code_slot_[[slot]]_use_day_of_week_limits
                  state: 'on'
          - type: custom:mushroom-template-badge
            entity: sensor.[[lock]]_code_slot_[[slot]]_sync_status
            label: Status
            content: '{{ state_translated(entity) }}'
            icon: |-
              {% if is_state(entity, "Synced") %}
                mdi:sync
              {% elif is_state(entity, "Adding") %}
                mdi:sync-circle
              {% elif is_state(entity, "Disconnected") %}
                mdi:sync-off
              {% elif is_state(entity, "Deleting") %}
                mdi:sync-circle
              {% else %}
                mdi:sync-alert
              {% endif %}
            color: |-
              {% if is_state(entity, "Synced") %}
                green
              {% elif is_state(entity, "Adding") %}
                purple
              {% elif is_state(entity, "Disconnected") %}
                grey
              {% elif is_state(entity, "Deleting") %}
                red
              {% else %}
                grey
              {% endif %}
            tap_action:
              action: more-info
            card_mod:
              style: |
                .badge {
                  background: none !important;
                  box-shadow: none !important;
                }
          - type: custom:mushroom-template-badge
            entity: binary_sensor.[[lock]]_code_slot_[[slot]]_active
            label: Active
            content: '{{ state_translated(entity) }}'
            icon: |-
              {% if is_state(entity, "on") %}
                mdi:lock-check
              {% elif is_state(entity, "off") %}
                mdi:lock-remove
              {% else %}
                mdi:lock-alert
              {% endif %}
            color: |-
              {% if is_state(entity, "on") %}
                green
              {% elif is_state(entity, "off") %}
                grey
              {% else %}
                grey
              {% endif %}
            tap_action:
              action: more-info
            card_mod:
              style: |
                .badge {
                  background: none !important;
                  box-shadow: none !important;
                }
          - type: custom:mushroom-template-badge
            icon: mdi:cogs
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Code [[slot]] Advanced Options
                  content:
                    type: custom:streamline-card
                    template: lock_advanced_options
                    variables:
                      - lock: '[[lock]]'
                      - slot: '[[slot]]'
      - type: entities
        show_header_toggle: false
        entities:
          - entity: text.[[lock]]_code_slot_[[slot]]_name
            name: Name
          - entity: text.[[lock]]_code_slot_[[slot]]_pin
            name: Pin
      - type: grid
        square: false
        card_mod:
          style:
            .: |
              #root {
                display: flex !important;
                flex-wrap: wrap;
                justify-content: space-between;
              }
              mushroom-template-badge, hui-conditional-card {
                flex: 0 0 auto !important;
              }
        cards:
          - type: custom:button-card
            template: badge
            entity: switch.[[lock]]_code_slot_[[slot]]_enabled
            name: Code
            icon: mdi:close-circle
            label: |
              [[[
                if (entity.state === 'on') return 'Enabled';
                else return 'Disabled';
              ]]]
            tap_action:
              action: toggle
            variables:
              color: |
                [[[
                  if (entity.state === 'on') return 'var(--green-color)';
                  else return 'var(--grey-color)';
                ]]]
            styles:
              card:
                - background-color: >-
                    color-mix(in srgb, var(--disabled-color) 12%,
                    var(--card-background-color) 100%) !important;
            state:
              - value: 'on'
                icon: mdi:check-circle
            extra_styles: |
              [[[
                return `
                @media (hover: hover) {
                  ha-card:hover {
                    background: color-mix(in srgb, ${variables.color} 4%, var(--card-background-color) 100%) !important;
                  }
                }
                `
                ]]]
          - type: custom:button-card
            template: badge
            entity: switch.[[lock]]_code_slot_[[slot]]_notifications
            name: Notifications
            icon: mdi:bell-off
            label: |
              [[[
                if (entity.state === 'on') return 'Enabled';
                else return 'Disabled';
              ]]]
            tap_action:
              action: toggle
            variables:
              color: |
                [[[
                  if (entity.state === 'on') return 'var(--green-color)';
                  else return 'var(--grey-color)';
                ]]]
            styles:
              card:
                - background-color: >-
                    color-mix(in srgb, var(--disabled-color) 12%,
                    var(--card-background-color) 100%)
            state:
              - value: 'on'
                icon: mdi:bell
            extra_styles: |
              [[[
                return `
                @media (hover: hover) {
                  ha-card:hover {
                    background: color-mix(in srgb, ${variables.color} 4%, var(--card-background-color) 100%) !important;
                  }
                }
                `
                ]]]
