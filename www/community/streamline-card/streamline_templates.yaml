          type: custom:mushroom-template-card
          entity: button.[[computer]]_lock
          vertical: true
          icon: |-
            {% if is_state("sensor.[[computer]]_session_state", "Locked") %}
              mdi:lock
            {% else %}
              mdi:lock-open
            {% endif %}
          color: >-
            {% if is_state("sensor.[[computer]]_session_state", "Locked") %}
              red
            {% elif is_state("sensor.[[computer]]_session_state", "Unlocked")
            %}
              green
            {% else %}
              grey
            {% endif %}
          features_position: bottom
          tap_action:
            action: none
          icon_tap_action:
            action: none
          icon_hold_action:
            action: call-service
            service: button.press
            target:
              entity_id: button.[[computer]]_lock
          card_mod:
            style:
              ha-tile-icon$: |
                .container {
                  /* Adjust icon size */
                  --mdc-icon-size: 28px !important;
                  width: 40px !important;
                  height: 40px !important;
                  border-radius: 20px !important;
                }
      - type: conditional
        conditions:
          - entity: binary_sensor.[[computer]]_connected
            state: 'on'
          - entity: button.[[computer]]_logoff
            state_not: unavailable
        card:
          type: custom:mushroom-template-card
          entity: button.[[computer]]_logoff
          vertical: true
          icon: mdi:logout
          color: grey
          features_position: bottom
          tap_action:
            action: none
          icon_tap_action:
            action: none
          icon_hold_action:
            action: call-service
            service: button.press
            target:
              entity_id: button.[[computer]]_logoff
          card_mod:
            style:
              ha-tile-icon$: |
                .container {
                  /* Adjust icon size */
                  --mdc-icon-size: 28px !important;
                  width: 40px !important;
                  height: 40px !important;
                  border-radius: 20px !important;
                }
      - type: conditional
        conditions:
          - entity: binary_sensor.[[computer]]_connected
            state: 'on'
          - entity: button.[[computer]]_suspend
            state_not: unavailable
