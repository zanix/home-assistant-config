person_popup:
  default:
    - phone_base: pixel_10
    - watch_base: pixel_watch
  card:
    type: vertical-stack
    cards:
      - type: history-graph
        hours_to_show: 48
        show_names: false
        entities:
          - entity: person.[[person]]
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.[[person]]_travel_time
            icon: mdi:map-clock
            color: purple
            features_position: bottom
            vertical: true
            primary: |-
              {% if entity | has_value %}
                {% set value = states(entity) | float * 60 %}

                {% set remaining = (
                    states[entity].last_updated | as_timestamp
                    - now() | as_timestamp
                    + value
                  )
                %}

                {% if remaining >= 60 %}
                  {{ (remaining / 60) | round(0) }}min
                {% elif remaining > 0 %}
                  {{ remaining | round(0) }}s
                {% elif remaining > 120 %}
                  Soon
                {% else %}
                  Time passed
                {% endif %}
              {% else %}
                Unknown
              {% endif %}
            secondary: |-
              {% if entity | has_value %}
                {% set value = states(entity) | float * 60 %}

                {% set eta = states[entity].last_updated | as_timestamp + value %}
                {% set eta_date = eta | timestamp_custom('%D') %}
                {% set now_date = now() | as_timestamp | timestamp_custom('%D') %}

                {% if eta >= now() | as_timestamp %}                  
                  {% if eta_date > now_date %}
                    {{ eta | timestamp_custom('%-I:%M %p') }} {{ eta_date }}
                  {% elif eta_date == now_date %}
                    {{ eta | timestamp_custom('%-I:%M %p') }}
                  {% endif %}
                {% endif %}
              {% else %}
                Unknown
              {% endif %}
            tap_action:
              action: more-info
            hold_action:
              action: perform-action
              target:
                entity_id: sensor.[[person]]_travel_time
              perform_action: homeassistant.update_entity
              data:
                entity_id:
                  - sensor.[[person]]_travel_time
            double_tap_action:
              action: none
          - type: custom:mushroom-template-card
            entity: sensor.home_[[person]]_direction_of_travel
            primary: |-
              {% if is_state("person.[[person]]", "home") %}
                Home
              {% elif is_state("person.[[person]]", "not_home") %}
                Away
              {% else %}
                {{ states("person.[[person]]") }}
              {% endif %}
            secondary: >-
              {{ ((states("sensor.home_[[person]]_distance") | float) / 5280)
              | round(1) }} mi
            icon: |-
              {% if is_state(entity, "towards") %}
                mdi:map-marker-left
              {% elif is_state(entity, "away_from") %}
                mdi:map-marker-right
              {% else %}
                mdi:map-marker-path
              {% endif %}
            color: |-
              {% if is_state(entity, "towards") %}
                green
              {% elif is_state(entity, "away_from") %}
                orange
              {% else %}
                grey
              {% endif %}
            features_position: bottom
            vertical: true
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            entity: sensor.[[phone_base]]_[[person]]_battery_level
            primary: '{{ states(entity) }}%'
            secondary: >
              {{ states("sensor.[[phone_base]]_[[person]]_battery_state") |
              replace('_', ' ') | title }}
            icon: mdi:cellphone
            color: >-
              {% from "util.jinja" import battery_color %} {% if
              is_state("sensor.[[phone_base]]_[[person]]_battery_state",
              "charging") %}
                light-blue
              {% else %}
                {{ battery_color(entity) }}
              {% endif %}
            badge_icon: >-
              {% set charge = "sensor.[[phone_base]]_[[person]]_battery_state"
              %} {% set type = "sensor.[[phone_base]]_[[person]]_charger_type"
              %} {% if is_state(charge, "charging") and is_state(type,
              "wireless") %}
                mdi:access-point
              {% elif is_state(charge, "charging") %}
                mdi:lightning-bolt
              {% elif int(states(entity), 0) < 11 %}
                mdi:exclamation-thick
              {% endif %}
            badge_color: '{{ ''red'' if int(states(entity), 0) < 11 else ''light-blue'' }}'
            features_position: bottom
            vertical: true
            tap_action:
              action: more-info
            card_mod:
              style:
                ha-tile-icon$: |
                  .container {
                    /* 3. Animate --level from 0 to --target-level */
                    animation: fillLevel 1.5s ease-in-out infinite;
                    /* Radial progress bar */
                    background:
                      radial-gradient(var(--card-background-color) 60%, transparent calc(60% + 1px)),
                      conic-gradient(var(--tile-color) {{ states(config.entity) }}% 0%, var(--card-background-color) 0% 100%
                    );
                  }
          - type: custom:mushroom-template-card
            entity: sensor.[[watch_base]]_[[person]]_battery_level
            layout: vertical
            primary: '{{ states(entity) }}%'
            secondary: >
              {{ states("sensor.[[watch_base]]_[[person]]_battery_state") |
              replace('_', ' ') | title }}
            icon: mdi:watch
            color: >-
              {% from "util.jinja" import battery_color %} {% if
              is_state("sensor.[[watch_base]]_[[person]]_battery_state",
              "charging") %}
                light-blue
              {% else %}
                {{ battery_color(entity) }}
              {% endif %}
            badge_icon: >-
              {% set charge = "sensor.[[watch_base]]_[[person]]_battery_state"
              %} {% set type = "sensor.[[watch_base]]_[[person]]_charger_type"
              %} {% if is_state(charge, "charging") and is_state(type,
              "wireless") %}
                mdi:access-point
              {% elif int(states(entity), 0) < 11 %}
                mdi:exclamation-thick
              {% endif %}
            badge_color: '{{ ''red'' if int(states(entity), 0) < 11 else ''light-blue'' }}'
            features_position: bottom
            vertical: true
            tap_action:
              action: more-info
            card_mod:
              style:
                ha-tile-icon$: |
                  {% from "util.jinja" import battery_color %}
                  .container {
                    /* Radial progress bar */
                    background:
                      radial-gradient(var(--card-background-color) 60%, transparent calc(60% + 1px)),
                      conic-gradient(var(--tile-color) {{ states(config.entity) }}% 0%, var(--card-background-color) 0% 100%
                    );
                  }
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.[[phone_base]]_[[person]]_network_type
            layout: vertical
            color: cyan
            features_position: bottom
            vertical: true
            icon: >-
              {% from "util.jinja" import wifi_icon %} {{
              wifi_icon("sensor.[[phone_base]]_[[person]]_wi_fi_signal_strength",
              "sensor.[[phone_base]]_[[person]]_wi_fi_connection") }}
            primary: >-
              {%- if is_state(entity, "cellular") -%}
                Cellular
              {%- elif not
              is_state("sensor.[[phone_base]]_[[person]]_wi_fi_connection",
              "<not connected>") -%}
                {{ states("sensor.[[phone_base]]_[[person]]_wi_fi_connection") | truncate(16) }}
              {%- else -%}
                Not Connected
              {%- endif -%}
            secondary: >-
              {% set signal_level =
              int(states("sensor.[[phone_base]]_[[person]]_wi_fi_signal_strength"),
              0) %} {% if signal_level != -1 %}
                {{ signal_level }} dBm
              {% endif %}
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            entity: sensor.[[watch_base]]_[[person]]_activity_state
            layout: vertical
            primary: Activity
            secondary: '{{ states(entity) | title }}'
            icon: mdi:account-reactivate
            color: pink
            features_position: bottom
            vertical: true
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            entity: sensor.[[watch_base]]_[[person]]_daily_steps
            layout: vertical
            primary: Steps
            secondary: '{{ states(entity, with_unit=True) }}'
            icon: mdi:walk
            color: lime
            features_position: bottom
            vertical: true
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            entity: sensor.[[watch_base]]_[[person]]_daily_calories
            layout: vertical
            primary: Calories
            secondary: '{{ states(entity, with_unit=True) }}'
            icon: mdi:food
            color: brown
            features_position: bottom
            vertical: true
            tap_action:
              action: more-info
      - type: grid
        square: false
        card_mod:
          style:
            .: |
              #root {
                display: flex !important;
                flex-wrap: wrap;
                justify-content: space-around;
              }
        cards:
          - type: custom:button-card
            template: button_label
            name: Find Phone
            label: Press and Hold to Cancel
            icon: mdi:target
            variables:
              color: var(--red-color)
            tap_action:
              action: call-service
              service: script.notify_mobile
              confirmation:
                text: Are you sure you want to ring this device?
              data:
                send_to: '{{ ''[[person]]'' }}'
                title: Find Phone
                message: Ringing phone...
                channel: alarm_stream
                tag: find-phone
                importance: high
              target: {}
            hold_action:
              action: call-service
              service: script.notify_mobile
              confirmation:
                text: Cancel find phone?
              data:
                send_to: '{{ ''[[person]]'' }}'
                notification_type: clear_notification
                tag: find-phone
            extra_styles: |
              [[[
                return `
                @media (hover: hover) {
                  ha-card:hover {
                    background: color-mix(in srgb, ${variables.color}, transparent 80%) !important;
                  }
                }
                `
                ]]]
      - type: tile
        entity: sensor.[[phone_base]]_[[person]]_geocoded_location
        name: Location
        features_position: bottom
        vertical: false
        color: blue
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card {
              /* Remove default card styling */
              --ha-card-background: none;
              --ha-card-box-shadow: none;
              --ha-card-border-width: 0;
            }
      - type: map
        entities:
          - entity: person.[[person]]
        aspect_ratio: '16:9'
        hours_to_show: 1
        auto_fit: true
        card_mod:
          style:
            .: |
              :host {
                /* Define Person State colors. Can be added to theme */
                --state-person-home: var(--green-color);
                --state-person-not-home: var(--red-color);
                --state-person-zone: var(--blue-color);
                --state-person-unknown: var(--grey-color);

                /* Set person state color */
                --state-person:
                {% if is_state(config.entities[0].entity, ['home', 'not_home', 'unknown']) %}
                  var(--state-person-{{ states(config.entities[0].entity) | replace('_', '-') }})
                {% else %}
                  var(--state-person-zone)
                {% endif %};
              }
              ha-card {
                /* Remove default card styling without affecting child elements */
                box-shadow: none;
                border-width: 0;
                transition: all 0s;
              }
              #buttons {
                margin: 15px 0 0 3px;
              }
            ha-map $ ha-entity-marker $: |
              .marker {
                /* Style person marker & adjust position to avoid blocking waypoints */
                border: 3px solid var(--state-person) !important;
                border-radius: 50% 50% 50% 0px !important;
                transform: rotate(-45deg) translate(50%, -50%);
                overflow: visible !important;
                background: var(--state-person) !important;
              }
              .entity-picture {
                /* Correct orientation of person avatar */
                transform: rotate(45deg);
                border-radius: 50%;
              }
            ha-map $: |
              path:first-child {
                /* Style accuracy radius */
                fill: color-mix(in srgb, var(--state-person) 50%, transparent);
                stroke-width: 0px;
              }
              path:nth-child(even) {
                /* Styling for waypoints */
                stroke: var(--primary-color);
                fill: var(--primary-color);
                stroke-width: 4px;
              }
              path:nth-child(odd):not(:first-child) {
                /* Styling for lines */
                stroke: var(--primary-color);
                stroke-width: 4px;
              }
              .leaflet-control-attribution {
                /* Style attribution text */
                display: none !important;
                background: rgba(var(--rgb-card-background-color), 0.2) !important;
                font-size: 8px;
              }
              .leaflet-container a {
                /* Set color of zoom icons & attribution text */
                color: var(--secondary-text-color);
              }
              .leaflet-control-zoom-in,
              .leaflet-control-zoom-out {
                /* Style zoom buttons like Chips */
                border-radius: var(--mush-chip-border-radius, 19px) !important;
                padding: 3px;
                background: rgb(var(--rgb-secondary-text-color), 0.2) !important;
                margin: 8px 12px 0px;
                border: var(--ha-card-border-width, 1px) solid var(--ha-card-border-color, var(--divider-color, #e0e0e0)) !important;
              }
              .leaflet-control-zoom {
                /* Remove extra margin */
                margin: 0px !important;

                /* Remove zoom control border */
                border: none !important;
              }
