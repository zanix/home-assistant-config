lock_card_day:
  default:
    - day: sunday
    - name: Sunday
    - slot: '1'
  card:
    type: vertical-stack
    cards:
      - type: heading
        heading: '[[name]]'
        heading_style: title
        badges:
          - type: custom:button-card
            template: badge
            entity: switch.[[lock]]_code_slot_[[slot]]_[[day]]
            name: Day
            icon: mdi:calendar-remove
            label: |
              [[[
                if (entity.state === 'on') return 'Enabled';
                else return 'Disabled';
              ]]]
            tap_action:
              action: toggle
            variables:
              color: |
                [[[
                  if (entity.state === 'on') return 'var(--green-color)';
                  else return 'var(--red-color)';
                ]]]
            styles:
              card:
                - background-color: >-
                    color-mix(in srgb, var(--disabled-color) 12%,
                    var(--card-background-color) 100%)
            state:
              - value: 'on'
                icon: mdi:calendar-today
            extra_styles: |
              [[[
                return `
                @media (hover: hover) {
                  ha-card:hover {
                    background: color-mix(in srgb, ${variables.color} 4%, var(--card-background-color) 100%) !important;
                  }
                }
                `
                ]]]
          - type: custom:button-card
            template: badge
            entity: switch.[[lock]]_code_slot_[[slot]]_[[day]]_limit_by_time_of_day
            name: Limit by Time
            icon: mdi:timer-lock-open
            label: |
              [[[
                if (entity.state === 'on') return 'Enabled';
                else return 'Disabled';
              ]]]
            tap_action:
              action: toggle
            variables:
              color: |
                [[[
                  if (entity.state === 'on') return 'var(--green-color)';
                  else return 'var(--red-color)';
                ]]]
            styles:
              card:
                - background-color: >-
                    color-mix(in srgb, var(--disabled-color) 12%,
                    var(--card-background-color) 100%)
            state:
              - value: 'on'
                icon: mdi:timer-lock
            extra_styles: |
              [[[
                return `
                @media (hover: hover) {
                  ha-card:hover {
                    background: color-mix(in srgb, ${variables.color} 4%, var(--card-background-color) 100%) !important;
                  }
                }
                `
                ]]]
      - type: conditional
        conditions:
          - condition: and
            conditions:
              - condition: state
                entity: switch.[[lock]]_code_slot_[[slot]]_use_day_of_week_limits
                state: 'on'
              - condition: state
                entity: switch.[[lock]]_code_slot_[[slot]]_[[day]]
                state: 'on'
              - condition: state
                entity: >-
                  switch.[[lock]]_code_slot_[[slot]]_[[day]]_limit_by_time_of_day
                state: 'on'
        card:
          type: vertical-stack
          cards:
            - type: entities
              entities:
                - entity: time.[[lock]]_code_slot_[[slot]]_[[day]]_start_time
                  name: Start Time
                - entity: time.[[lock]]_code_slot_[[slot]]_[[day]]_end_time
                  name: End Time
              footer:
                type: custom:button-card
                template: badge
                icon: mdi:plus-minus
                entity: >-
                  switch.[[lock]]_code_slot_[[slot]]_[[day]]_include_on_exclude_off_time
                name: Time Range
                label: |
                  [[[
                    if (entity.state === 'on') return 'Included';
                    else return 'Excluded';
                  ]]]
                tap_action:
                  action: toggle
                variables:
                  color: |
                    [[[
                      if (entity.state === 'on') return 'var(--green-color)';
                      else return 'var(--red-color)';
                    ]]]
                styles:
                  card:
                    - background-color: >-
                        color-mix(in srgb, var(--disabled-color) 12%,
                        var(--card-background-color) 100%)
                extra_styles: |
                  [[[
                    return `
                    @media (hover: hover) {
                      ha-card:hover {
                        background: color-mix(in srgb, ${variables.color} 4%, var(--card-background-color) 100%) !important;
                      }
                    }
                    `
                    ]]]
