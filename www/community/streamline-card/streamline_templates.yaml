motion_card:
  default:
    - motion_entity: []
  card:
    type: custom:mushroom-template-card
    entity: '[[entity]]'
    primary: '[[name]]'
    secondary: |-
      {%- if is_state("[[motion_entity]]", "on") -%}
        Motion
      {%- elif is_state(entity, "on") -%}
        Detected
      {%- else -%}
        Clear
      {%- endif -%}
    icon: |-
      {%- if is_state("[[motion_entity]]", "on") -%}
        mdi:motion-sensor
      {%- elif is_state(entity, "on") -%}
        mdi:walk
      {%- else -%}
        mdi:motion-sensor-off
      {%- endif -%}
    color: |-
      {%- if is_state("[[motion_entity]]", "on") -%}
        orange
      {%- elif is_state(entity, "on") -%}
        green
      {%- else -%}
        grey
      {%- endif -%}
    features_position: bottom
package_delivery:
  card:
    type: custom:mushroom-template-badge
    entity: '[[entity]]'
    label: '[[name]]'
    content: >-
      {{ states(entity) }} {{ iif(int(states(entity), 0) == 1, "package",
      "packages") }}
    icon: '[[icon]]'
    color: '[[icon_color]]'
    tap_action:
      action: fire-dom-event
      browser_mod:
        service: browser_mod.popup
        data:
          title: '[[name]] Tracking'
          adaptive: true
          content:
            type: custom:vertical-stack-in-card
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: none;
                  --ha-card-box-shadow: none;
                  --ha-card-border-width: 0;
                }
            cards:
              - type: custom:mushroom-template-card
                entity: '[[entity]]'
                primary: '[[name]]'
                secondary: >-
                  {{ states(entity) }} {{ iif(int(states(entity), 0) == 1,
                  "package", "packages") }}
                icon: '[[icon]]'
                color: '[[icon_color]]'
                features_position: bottom
              - type: heading
                icon: mdi:map-marker-path
                heading: Tracking Numbers
                heading_style: title
              - type: markdown
                content: >-
                  {%- set orders = state_attr("[[entity]]", "tracking_#") -%}
                  {%- if state_attr("[[entity]]", "order") -%}
                    {%- set orders = state_attr("[[entity]]", "order") -%}
                  {%- endif -%} {% for number in orders -%}
                    <ha-icon icon="mdi:package-variant-closed"></ha-icon> [{{ number }}]({{ "[[url]]" | replace("##TRACK_ID##", number) }})
                  {% endfor %}
