---
# The template integration allows creating entities which derive their values
# from other data. This is done by specifying templates for properties of an
# entity, like the name or the state.
#
# https://www.home-assistant.io/integrations/template/
#
# This binary sensor is used to determine if there are any packages out for
# delivery
#
binary_sensor:
  - name: Out for Delivery
    availability: '{{ has_value("sensor.imap_gmail_com_mail_packages_in_transit") or has_value("sensor.imap_gmail_com_mail_usps_mail") }}'
    state: "{{ (states('sensor.imap_gmail_com_mail_packages_in_transit') | int(default=0)) > 0 or (states('sensor.imap_gmail_com_mail_usps_mail') | int(default=0)) > 0 }}"
    icon: mdi:package-variant-plus
