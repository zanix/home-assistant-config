# This file is managed by the GUI Recorder integration.
# Manual edits will be overwritten.

auto_purge: true
auto_repack: true
purge_keep_days: 10
commit_interval: 5

exclude:
  entities:
  - binary_sensor.apollo_msr_1_office_radar_moving_target
  - binary_sensor.apollo_msr_1_office_radar_still_target
  - binary_sensor.apollo_msr_1_office_radar_zone_1_occupancy
  - binary_sensor.apollo_msr_1_office_radar_zone_2_occupancy
  - binary_sensor.apollo_msr_1_office_radar_zone_3_occupancy
  - binary_sensor.apollo_msr_1_office_radar_zone_occupancy
  - media_player.ardena
  - media_player.denon_avr_s760h
  - media_player.nasya
  - media_player.samsung_soundbar
  - media_player.workjosh
  - sensor.apollo_msr_1_office_radar_move_energy
  - sensor.apollo_msr_1_office_radar_moving_distance
  - sensor.apollo_msr_1_office_radar_still_distance
  - sensor.apollo_msr_1_office_radar_still_energy
  - sensor.home_assistant_core_uptime
  - sensor.uptime
  domains:
  - camera
  - update
  entity_globs:
  - media_player.androidtv_*
  - media_player.family_room_*
  - media_player.jellyfin_*
  - media_player.living_room_*
  - media_player.main_bedroom_*
  - media_player.plex_*
  - media_player.shield_*
  - media_player.vizio_*
  - sensor.*_last_seen
  - sensor.*_node_status
  - sensor.date*
  - sensor.time*
