blueprint:
  name: Automatic Gate ⛩️
  source_url: "https://github.com/etiennec78/Home-Automation/blob/master/Blueprints/Automatic-Gate/automatic-gate.yaml"
  domain: automation
  author: etiennec78
  description: |-
    # Automatic Gate ⛩️

    ## Description 📝
    Modular and secure gate automation that opens and closes your gate when you leave or arrive
    Makes managing your gate while driving easier: You won't ever have to use your remote again!

    <details>
      <summary><h2>Key Features 🌟</h2></summary>

    * **Multi-User Support**: Manages up to 10 drivers simultaneously 🚗
    * **Broad Compatibility**: This blueprint is compatible with most vehicles and most travel time providers (Waze, Here, smart vehicles) 🔗
    * **Notification Translations**: This blueprint ships with built-in and custom translations 🌍
    * **Security & Reliability**:
      * Precise ETA calculations to have your gate fully open exactly when you arrive home 🎯
      * Vehicle status monitoring to cancel the itinerary and close the gate if you stop your vehicle or pass by without entering ✋
      * Collision prevention to ensure the gate doesn't close on anyone arriving or leaving at the same time 🚧
      * Built-in timeouts in case of an internet loss ⏳
      * Maximum entry and leaving time before auto-closing ⌛
      * Custom forbidden zones to cancel the itinerary when entered ⛔
      * Notification alerts at each decision of the automation 🚨
    * **Customizable Settings**:
      * Open/Close the gate
        * Automatically 🧠
        * By asking for a confirmation ✅
        * By starting a cancellable timer ⏱️
      * Customizable gate operation timings 🛠️
      * Customizable travel time refresh rate 🔁
      * Read notifications aloud on Android 🗣️
      * Multiple gate support ⛩️
      * Open/Close with BLE trackers 📡
    * House locks and alarm support 🔐
      * Avoid opening when parked near house 🅿️

    </details>

    ## More info ℹ️
    * Version: 2.0.0 ([4433455](https://github.com/etiennec78/Home-Automation/commit/4433455a720346fe180324b5e23f61e8eb9e736f))
    * Set up sensors: [click here](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md)
    * Github: [click here](https://github.com/etiennec78/Home-Automation/tree/master/Blueprints/Automatic-Gate)
    * Discord: @etiennec78
    [![ko-fi](https://ko-fi.com/img/githubbutton_sm.svg)](https://ko-fi.com/C0C5XVRMM)
  homeassistant:
    min_version: 2026.2.0
  input:
    essential_inputs:
      name: Essential inputs
      icon: "mdi:gate"
      collapsed: true
      input:
        gate:
          name: ⛩️ Gates
          description: The **switch** or **cover** that controls your **[gate](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#gate-%EF%B8%8F)**
          selector:
            entity:
              multiple: true
              filter:
                domain:
                  - switch
                  - cover
        gate_location:
          name: 📍 Gate location
          description: |-
            The zone where your gate is located
            Used to detect whether you are leaving or arriving
          default: "zone.home"
          selector:
            entity:
              filter:
                domain: zone
        arrival_opening_method:
          name: 🔓 Gate opening method on arrival
          description: |-
            Which method should be used to detect your arrival and open the gate
          default: "time"
          selector:
            select:
              options:
                - label: Travel time (recommended)
                  value: time
                - label: Bluetooth LE
                  value: ble
                - label: Zone (not recommended)
                  value: zone
        activation_zone:
          name: 🔒 Gate activation zone
          description: |-
            At what **distance** from the gate should the automation start estimating when to **open the gate**?
            > *The gate will **close** if you **leave** this zone*
          default: 500
          selector:
            number:
              min: 150
              max: 5000
              unit_of_measurement: m
        lead_time:
          name: 🕓 Lead time
          description: |-
            Time (in seconds) to open the gate **before you arrive**
            Include the gate movement time + a safety margin
          default: 75
          selector:
            number:
              min: 10
              max: 300
              unit_of_measurement: s

    per_person_sensors:
      name: Per person sensors
      icon: mdi:account-multiple
      collapsed: true
      description: |-
        ⚠️ Please enter the same number of items in each input (unless otherwise specified), and keep users in the same order
      input:
        persons:
          name: 👤 Persons / GPS trackers
          description: |-
            Each **user** to **[track](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#gps-location-trackers--persons-)** for **location updates**
            > *It is advised to configure [High Accuracy Mode](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#android-) on Android*

            > *You can enter only one device tracker for multiple users if it is provided by your vehicle*
          selector:
            entity:
              multiple: true
              filter:
                domain:
                  - device_tracker
                  - person
        driving_sensors:
          name: 🚗 Driving sensors
          description: Each **[driving sensor](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#driving-sensors-)** that should trigger the automation
          selector:
            entity:
              multiple: true
              filter:
                domain:
                  - binary_sensor
                  - input_boolean
        travel_time_sensors:
          name: ✈️ Travel time sensors
          description: |-
            One **[travel time sensor](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#travel-time-sensors-%EF%B8%8F)** per person/tracker
            It should provide the **remaining time before arrival**
            > *Optional if open when connected to BLE is true*
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: sensor
                device_class:
                  - duration
                  - timestamp
        notify_devices:
          name: 💬 Notify devices
          description: |-
            Each [**device** to **notify**](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#notify-services-)
            > *Optional but highly recommended*

            > *If a driver does not have a notify device, gate behaviors will be limited to 'Fully automatic' and 'Disabled'*
          default: []
          selector:
            device:
              multiple: true
              filter:
                integration: mobile_app
        itinerary_sensors:
          name: 🗺️ Itinerary sensors
          description: |-
            One empty **[itinerary input_text](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#itinerary-sensors-%EF%B8%8F)** helper per user, to store their **itinerary state**
            > ⚠️ The maximum length must be set to 255

            > 💡 You can sync multiple instances of Automatic Gate by appending sensors from the other instances to the end of this list
          selector:
            entity:
              multiple: true
              filter:
                domain: input_text

    refresh_rate:
      name: Refresh rate
      icon: mdi:timer
      collapsed: true
      input:
        travel_time_rate:
          name: 🔄 Travel time refresh rate
          description: |-
            Calculate the remaining travel time

            - **Continuously**: can be useful to show an ETA on your dashboard
            - **While near home**: is the default
            - **Once when near home**: calls the API once, but it can trigger if you come near your gate without entering
            - **Listen for updates**: is for vehicles that provide their own travel time sensor

            > ⚠️ Travel time sensor [polling](https://www.home-assistant.io/integrations/waze_travel_time/#defining-a-custom-polling-interval) should be disabled if not using 'Listen for updates'
          default: "near-home"
          selector:
            select:
              options:
                - label: Continuously
                  value: "continuous"
                - label: While near home
                  value: "near-home"
                - label: Once when near home
                  value: "once"
                - label: Listen for updates
                  value: "listen"
        refresh_function:
          name: ⏳ Travel time refresh function
          description: |-
            Template that returns the delay between two travel time API calls
            > *Only active with a refresh rate set to **'Continuously'** or **'While near home'***
          default: |-
            {{
              max(seconds_before_opening / 5, 5)
              if in_activation_zone
              else max(seconds_before_opening / 3, 60)
            }}
          selector:
            template:
        pause_refresh_driving_away:
          name: ⏸️ Pause travel time refresh while driving away
          description: Stop calling the travel time API while the user is moving away from the activation zone
          default: true
          selector:
            boolean:
        request_gps_location:
          name: 🛰️ Request GPS location
          description: |-
            Request an updated phone location when the current location is outdated (based on the travel time sensor)

            > If you are using an Android phone, please consider using the [High Accuracy Mode](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#settings-) instead

            > ⚠️ GPS requests need the [Single accurate location](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#extra-requesting-manual-gps-updates-) sensor turned on in the companion app
          default: false
          selector:
            boolean:
        gps_request_refresh_function:
          name: ⏳ GPS request refresh function
          description: |-
            Template that returns the delay between two GPS requests, taking the remaining time into account
          default: "{{ max(seconds_before_opening / 3, 5) }}"
          selector:
            template:
        gps_outdated_function:
          name: ⌛ GPS outdated function
          description: |-
            Template that returns the age after which GPS is considered outdated, and a refresh request is sent
          default: "{{ max(seconds_before_opening / 10, 5) }}"
          selector:
            template:

    gate_behavior:
      name: Gate behavior
      icon: mdi:brain
      collapsed: true
      description: |-
        Available gate behaviors:
        - **Fully automatic**: Your gate opens/closes by itself
        - **Cancelable timer**: A notification with a cancelable timer is sent before opening/closing
        - **Notification request**: An actionable notification is sent to open/close
        - **Disabled**: Your gate will not open/close
      input:
        departure_opening_behavior:
          name: 🛫🔓 Departure opening behavior
          description: |-
            Automatic gate **opening** behavior on **departure**
          default: "auto"
          selector:
            select:
              options:
                - label: Fully automatic
                  value: "auto"
                - label: Cancelable timer
                  value: "timer"
                - label: Notification request
                  value: "notif"
                - label: Disabled
                  value: "off"
        departure_closing_behavior:
          name: 🛫🔐 Departure closing behavior
          description: |-
            Automatic gate **closing** behavior on **departure**
          default: "notif"
          selector:
            select:
              options:
                - label: Fully automatic
                  value: "auto"
                - label: Cancelable timer
                  value: "timer"
                - label: Notification request
                  value: "notif"
                - label: Disabled
                  value: "off"
        arrival_opening_behavior:
          name: 🛬🔓 Arrival opening behavior
          description: |-
            Gate automatic **opening** behavior on **arrival**
          default: "auto"
          selector:
            select:
              options:
                - label: Fully automatic
                  value: "auto"
                - label: Cancelable timer
                  value: "timer"
                - label: Notification request
                  value: "notif"
                - label: Disabled
                  value: "off"
        arrival_closing_behavior:
          name: 🛬🔐 Arrival closing behavior
          description: |-
            Gate automatic **closing** behavior on **arrival**
          default: "auto"
          selector:
            select:
              options:
                - label: Fully automatic
                  value: "auto"
                - label: Cancelable timer
                  value: "timer"
                - label: Notification request
                  value: "notif"
                - label: Disabled
                  value: "off"
        timer_opening:
          name: ⏱️🔓 Cancelable timer time for opening
          description: Delay before the gate opens automatically in 'cancelable timer' mode (if you don't cancel)
          default: 5
          selector:
            number:
              min: 1
              max: 20
              unit_of_measurement: s
        timer_closing:
          name: ⏱️🔐 Cancelable timer time for closing
          description: Delay before the gate closes automatically in 'cancelable timer' mode (if you don't cancel)
          default: 15
          selector:
            number:
              min: 1
              max: 120
              unit_of_measurement: s
        suggest_closing_after:
          name: 🔐 Suggest closing after
          description: Time to wait before **suggesting to close** on departure, if you use **notification request** but don't have a sensor to detect that you left
          default: 120
          selector:
            number:
              min: 1
              max: 600
              unit_of_measurement: s
        partial_open_position:
          name: ↔️ Gate partial opening
          description: |-
            Define the target position for partial opening (e.g., for bicycles)
            > This feature only works with covers that support setting position
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"

    security_features:
      name: Security features
      icon: mdi:security
      collapsed: true
      input:
        security_notif_override:
          name: 🔁 Override notification request for safety feature
          description: If a safety feature triggers a close, change the behavior from 'notification request' to 'timer'
          default: true
          selector:
            boolean:
        safety_delay:
          name: 🔐 Auto-close safety delay
          description: Time to wait before **automatically closing** if the gate is open but you still haven't left or arrived
          default: 5
          selector:
            number:
              min: 2
              max: 30
              unit_of_measurement: min
        timeout_delay:
          name: ⌛ Timeout delay
          description: |-
            How long the automation waits before **stopping** if your phone **times out** and stops sending location updates while you are in the activation zone
            > *If your position provider doesn't let you use a high accuracy mode (like iOS), please increase this value*
          default: 2
          selector:
            number:
              min: 0.5
              max: 30
              unit_of_measurement: min
        forbidden_zones:
          name: ⛔ Forbidden zones
          description: If you enter any of these zones while driving home, your itinerary will be canceled
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: zone
        quick_triggers_reopen_gate:
          name: 🚨 Reopen gate if driving sensor triggers too quickly
          description: Reopen the gate if your driving sensor turns on/off too quickly (to avoid closing on your vehicle)
          default: true
          selector:
            boolean:
        ask_reopen_manually_closed:
          name: 🚧 Ask before reopening if manually closed
          description: If the gate was closed recently (but not automatically), ask for confirmation before reopening on departure
          default: true
          selector:
            boolean:

    notification_settings:
      name: Notification settings
      icon: mdi:bell
      collapsed: true
      input:
        language:
          name: Notification language
          description: |-
            The **language** used for **notifications**
            > *If your language is not supported by this blueprint, please [open a pull request](https://github.com/etiennec78/Home-Automation/pulls)*
          default: "en"
          selector:
            language:
              languages:
                - en
                - fr
        custom_translations:
          name: Custom translations
          description: |-
            A **YAML** dictionary to override the default **notification translations**
            > *You can find the translation keys in the `strings['en']` variable in the code, or in your traces*
          default:
            title: {}
            message: {}
            button: {}
          selector:
            object:
        itinerary_started_notif:
          name: 🏁 Itinerary started notification
          description: Send a notification when the itinerary starts
          default: true
          selector:
            boolean:
        phone_tts:
          name: 📳 Phone TTS
          description: Read notifications **aloud** on **Android** phones
          default: false
          selector:
            boolean:
        phone_tts_stream:
          name: 📻 Phone TTS audio stream
          description: |-
            The **audio stream** used to play phone TTS
            Useful to **bypass Do Not Disturb**
          default: "notification_stream"
          selector:
            select:
              options:
                - label: Notification stream
                  value: "notification_stream"
                - label: Alarm stream
                  value: "alarm_stream"
                - label: Alarm stream (max volume)
                  value: "alarm_stream_max"

    presence_sensors:
      name: Presence sensors
      icon: mdi:leak
      collapsed: true
      input:
        close_when_disconnected_from:
          name: 📡 Close on departure when disconnected from
          description: Close the gate if the driver's BLE device is out of range
          default: []
          selector:
            select:
              multiple: true
              options:
                - label: Bluetooth LE
                  value: ble
        only_open_near:
          name: 🧭 Confirm the location on startup
          description: |-
            Wait for a sensor to confirm your location before starting this blueprint
            > Useful if your vehicle is parked near your home (to avoid opening), or if your phone updates GPS too slowly and may still report you as home after you leave

            > ⚠️ GPS requests need the [Single accurate location](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#extra-requesting-manual-gps-updates-) sensor turned on in the companion app

            > *WiFi can be slow to report new states*
          default: []
          selector:
            select:
              multiple: true
              options:
                - label: GPS
                  value: gps
                - label: Wi-Fi (departure)
                  value: wifi
                - label: Bluetooth LE (departure)
                  value: ble
        only_open_near_timeout:
          name: ⌛ Location confirmation timeout
          description: How long the blueprint waits for location confirmation before canceling the sequence
          default: 60
          selector:
            number:
              min: 0
              max: 1800
              unit_of_measurement: s
        gps_outdated_delay:
          name: ⌛ Location confirmation outdated GPS delay
          description: Age after which GPS is considered outdated and a refresh request is sent
          default: 10
          selector:
            number:
              min: 0
              max: 300
              unit_of_measurement: s
        wifi_devices:
          name: 🏠 WiFi devices
          description: |-
            Each driver's Wi‑Fi device tracker
            > *Please place user sensors in the same order*
          default: []
          selector:
            entity:
              multiple: true
              filter:
                - domain: sensor
                  device_class:
                    - signal_strength
                    - distance
                - domain: device_tracker
        ble_entities:
          name: 🔎 BLE tracker entities
          description: |-
            Each **[BLE tracker entity](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#bluetooth-entities-)** to monitor your distance from the gate
            > *Please place user sensors in the same order*
          default: []
          selector:
            entity:
              multiple: true
              filter:
                - domain: sensor
                  device_class:
                    - signal_strength
                    - distance
                    - bermuda__custom_device_class
                - domain: device_tracker
        ble_away_timeout:
          name: ⌛ BLE away timeout
          description: |-
            Time without updates after which the BLE device is considered away
            > *Some trackers have a built-in away timeout. In this case, this value can be kept at 0.*
          default: 0
          selector:
            number:
              min: 0
              max: 300
              unit_of_measurement: s
        ble_transmitter_entities:
          name: 📡 iBeacon transmitter entities
          description: |-
            Each **[iBeacon transmitter entity](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#bluetooth-transmitter-)** used to restore the previous transmitter power settings when iBeacon is not needed anymore
            > *Optional if your iBeacon transmitter is not your phone, or is always on at high speed*
          default: []
          selector:
            entity:
              multiple: true
              filter:
                integration: mobile_app
                domain: sensor
                device_class: enum
        ble_scanner_switch:
          name: ⏯️ BLE scanner activator switch
          description: |-
            The **[switch](https://github.com/etiennec78/Home-Automation/blob/master/sensors.md#bluetooth-scanner-switch-)** to automatically **start and stop BLE scanning** when needed
            > *Leave empty if you want your BLE scanner to be always on*
          default: ""
          selector:
            entity:
              filter:
                domain: switch

    house_security:
      name: House security
      description: |-
        Arms/locks on departure once the gate starts closing, and disarms/unlocks on arrival after the vehicle has stopped
      icon: mdi:shield-home
      collapsed: true
      input:
        alarm:
          name: 🛡️ Alarm
          description: |-
            Your home **alarm**
          default: ""
          selector:
            entity:
              filter:
                domain: alarm_control_panel
        alarm_code:
          name: 🔑 Alarm code
          description: |-
            The code used to disarm your alarm
          default: ""
          selector:
            text:
        locks:
          name: 🔐 Locks
          description: |-
            The **locks** that open your home's **doors**
            > *They will lock on exit once the gate is closed, and unlock once the vehicle has arrived and been turned off*
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: lock
        security_features:
          name: 🛡️ Security features
          description: |-
            The **security features** that the blueprint must manage
          default:
            - "arm"
            - "disarm"
            - "lock"
            - "unlock"
            - "unlatch"
          selector:
            select:
              multiple: true
              options:
                - label: Arm alarm
                  value: "arm"
                - label: Night mode arming
                  value: "night"
                - label: Disarm alarm
                  value: "disarm"
                - label: Lock doors
                  value: "lock"
                - label: Unlock doors
                  value: "unlock"
                - label: Unlatch doors
                  value: "unlatch"
        dont_lock_if_people_remaining:
          name: 🏠 Do not lock/arm if there are still people home
          description: |-
            Avoid locking and arming the alarm if some person entities are still in the gate zone (besides yourself)
            > *If you drive away with multiple people, they might still be detected home and prevent locking*
          default: false
          selector:
            boolean:

    config_checker:
      name: Config checker
      icon: mdi:shield-check
      collapsed: true
      input:
        run_checks_when_enabled:
          name: 🧪 Run tests when blueprint enabled
          description: Run tests after adding the blueprint or updating inputs
          default: true
          selector:
            boolean:
        always_run_checks:
          name: 🧪 Run tests when triggered
          description: Run tests when the blueprint is triggered by a driving sensor
          default: true
          selector:
            boolean:

variables:
  MAX_INT: 2147483647
  gate: !input gate
  gate_location: !input gate_location
  gate_areas: "{{ gate | map('area_id') | difference([none]) | list }}"
  lead_time: !input lead_time
  partial_open_position: !input partial_open_position
  security_notif_override: !input security_notif_override
  safety_delay: !input safety_delay
  timeout_delay: !input timeout_delay
  persons: !input persons
  driving_sensors: !input driving_sensors
  travel_time_sensors: !input travel_time_sensors
  notify_devices: !input notify_devices
  notify_services: >-
    {{
      notify_devices
      | map('device_attr', 'name')
      | map('slugify')
      | map('regex_replace', '^', 'notify.mobile_app_')
      | list
    }}
  notify_service: null
  itinerary_sensors: !input itinerary_sensors
  travel_time_rate: !input travel_time_rate
  request_gps_location: !input request_gps_location
  behavior:
    departure:
      opening: !input departure_opening_behavior
      closing: !input departure_closing_behavior
    arrival:
      opening: !input arrival_opening_behavior
      closing: !input arrival_closing_behavior
  activation_zone: !input activation_zone
  suggest_closing_after: !input suggest_closing_after
  timer_opening: !input timer_opening
  timer_closing: !input timer_closing
  language: !input language
  custom_translations: !input custom_translations
  ble_entities: !input ble_entities
  ble_scanner_switch: !input ble_scanner_switch
  ble_transmitter_entities: !input ble_transmitter_entities
  only_open_near: !input only_open_near
  only_open_near_timeout: !input only_open_near_timeout
  gps_outdated_delay: !input gps_outdated_delay
  close_when_disconnected_from: !input close_when_disconnected_from
  itinerary_started_notif: !input itinerary_started_notif
  wifi_devices: !input wifi_devices
  forbidden_zones: !input forbidden_zones
  arrival_opening_method: !input arrival_opening_method
  alarm: !input alarm
  alarm_code: !input alarm_code
  security_features: !input security_features
  dont_lock_if_people_remaining: !input dont_lock_if_people_remaining
  silent_error: false
  config_checker_tag: "{{ 'config-checker-' ~ this.attributes.id }}"
  opening_order_id: "{{ 'opening_order_' ~ this.context.id }}"
  closing_order_id: "{{ 'closing_order_' ~ this.context.id }}"
  canceling_order_id: "{{ 'canceling_order_' ~ this.context.id }}"
  default_itinerary_sensor_value:
    status: null
    error: null
    quick_triggers: 0
    last_closed: 0
    auto_closed: false
  critical_errors:
    - "travel_time_did_not_respond"
  error_checker_ran: false
  blueprint_name: "{{ state_attr(this.entity_id, 'friendly_name') }}"
  strings:
    en:
      title:
        itinerary_started: "Itinerary started 🏁"
        open_gate: "Open gate ? 🔓"
        close_gate: "Close gate ? 🔐"
        timer_opening: "Gate opening in {{timer_opening}}s 🔓"
        timer_closing: "Gate closing in {{timer_closing}}s 🔐"
        gate_reopening: "Gate reopening 🔓"
        itinerary_canceled: "Automatic Gate stopped ❌"
        awaiting: "Gate awaiting {awaited_persons} 💤"
        disabled: "Automatic Gate disabled 🚫"
