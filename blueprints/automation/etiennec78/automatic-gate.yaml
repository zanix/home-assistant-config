triggers:
  - alias: Trigger when user connects to vehicle
    trigger: state
    id: vehicle_started
    entity_id: !input driving_sensors
    from: "off"
    to: "on"
  - alias: Trigger when the blueprint the user added the blueprint, updated inputs, or HA started
    trigger: template
    id: blueprint_enabled
    value_template: "{{ is_state(this.entity_id, 'on') }}"
  - alias: Trigger when HA starts
    trigger: homeassistant
    id: ha_started
    event: start

actions:
  - alias: If triggered by HA startup
    if:
      - condition: trigger
        id:
          - ha_started
          - blueprint_enabled
    then:
      - alias: Reset all itinerary sensors
        repeat:
          for_each: !input itinerary_sensors
          sequence:
            - alias: Get the current itinerary value
              variables:
                itinerary_sensor: "{{ repeat.item }}"
                itinerary_value: &get_itinerary_value >-
                  {%
                    set state = (
                      states(itinerary_sensor)
                      | from_json(default_itinerary_sensor_value)
                    )
                  %}
                  {%
                    if default_itinerary_sensor_value.keys() == state.keys()
                  %}
                    {{ state }}
                  {% else %}
                    {{ default_itinerary_sensor_value }}
                  {% endif %}
            - alias: Reset the itinerary status
              variables: &reset_itinerary
                update:
                  status: null
                itinerary_value: "{{ itinerary_value | combine(update) }}"
            - alias: Save the itinerary status
              action: input_text.set_value
              target:
                entity_id: "{{ itinerary_sensor }}"
              data:
                value: "{{ itinerary_value | to_json }}"
      - alias: If triggered by HA startup, or blueprint enabled but checks are disabled
        if:
          - condition: or
            conditions:
              - condition: trigger
                id: ha_started
              - condition: and
                conditions:
                  - condition: trigger
                    id: blueprint_enabled
                  - condition: not
                    conditions:
                      - condition: template
                        value_template: !input run_checks_when_enabled
        then:
          - stop: Itinerary sensors reset
  - alias: Initialize a variable to check if an error occured
    variables:
      errored: true
  - alias: Run the automation in an error-safe sequence
    sequence:
      - alias: If the blueprint was triggered by a driving sensor
        if:
          - condition: trigger
            id: vehicle_started
        then:
          - alias: Set variables containing data related to the driver
            variables:
              idx: "{{ driving_sensors.index(trigger.entity_id) }}"
              driver: >-
                {% if idx < persons | length %}
                  {{ persons[idx] }}
                {% elif persons | length == 1 %}
                  {{ persons[0] }}
                {% else %}
                  {{ none }}
                {% endif %}
              driving_sensor: "{{ trigger.entity_id }}"
              travel_time_sensor: >-
                {% if travel_time_sensors | length > idx %}
                  {{ travel_time_sensors[idx] }}
                {% else %}
                  {{ none }}
                {% endif %}
              notify_service: >-
                {% if notify_services | length > idx %}
                  {{ notify_services[idx] }}
                {% else %}
                  {{ none }}
                {% endif %}
              ios_device: >-
                {{
                  false if notify_service is none
                  else device_attr(notify_devices[idx], 'manufacturer') == 'Apple'
                }}
              itinerary_sensor: "{{ itinerary_sensors[idx] }}"
              itinerary_value: *get_itinerary_value
              ble_transmitter_entity: >-
                {{
                  ble_transmitter_entities[idx]
                  if ble_transmitter_entities | length > idx
                  else none
                }}
      - alias: Check that custom strings are valid
        variables:
          custom_translations_error: "{{ custom_translations is not mapping }}"
      - alias: If the custom translations is not a mapping
        if:
          - condition: template
            value_template: "{{ custom_translations_error }}"
        then:
          - alias: Reset the custom translations
            variables:
              custom_translations: {}
      - alias: If the config checker should run checks
        if:
          - condition: or
            conditions:
              - alias: If the blueprint was executed manually
                condition: template
                value_template: "{{ trigger.platform is none }}"
              - alias: If checks should be run when triggered by a driving sensor
                condition: and
                conditions:
                  - condition: trigger
                    id: vehicle_started
                  - condition: template
                    value_template: !input always_run_checks
              - alias: If the user added the blueprint, updated inputs, or HA started
                condition: trigger
                id: blueprint_enabled
        then:
          ##################
          # ERROR CHECKING #
          ##################

          - alias: Initialize variables for the error checker
            variables:
              error_checker_ran: true
              successful_check: false
              messages: []
              api_calls: 0
              error_level: 0
          - alias: Run the error checker in an error-safe sequence
            sequence:
              - alias: If the arrival opening method is set to 'Travel time'
                if:
                  - condition: template
                    value_template: "{{ arrival_opening_method == 'time' }}"
                then:
                  - alias: Initialize variables for the next loop
                    variables:
                      remaining: 7200
                      seconds_before_opening: >-
                        {{
                          remaining
                          - lead_time
                          - (5 if behavior.arrival.opening == "timer" else 0)
                        }}
                      activation_zone_duration: "{{ activation_zone/50*3.6 }}"
                      in_activation_zone: false
                      first_time_in: true
                  - alias: Get how many times the travel time API would have been called in a 2h trip
                    repeat:
                      while:
                        - alias: The travel time wouldn't have reached 0 yet
                          condition: template
                          value_template: "{{ seconds_before_opening > 0 }}"
                        - alias: The amount of api calls would be below 300
                          condition: template
                          value_template: "{{ api_calls < 300 }}"
                      sequence:
                        - alias: Set the estimated time until the activation zone and the next refresh
                          variables:
                            time_until_activation_zone: "{{ remaining - activation_zone_duration }}"
                            in_activation_zone: "{{ time_until_activation_zone < 0 }}"
                            next_refresh: !input refresh_function
                        - alias: If the user would have entered the activation sooner than the next refresh
                          if:
                            - condition: template
                              value_template: >-
                                {{
                                  time_until_activation_zone < next_refresh
                                  and first_time_in
                                }}
                          then:
                            - alias: Force a travel time timeout re-evaluation
                              variables:
                                first_time_in: false
                                next_refresh: "{{ time_until_activation_zone }}"
                        - alias: Update the fake travel time
                          variables:
                            remaining: "{{ remaining - next_refresh }}"
                            seconds_before_opening: >-
                              {{
                                remaining
                                - lead_time
                                - (5 if behavior.arrival.opening == "timer" else 0)
                              }}
                            api_calls: "{{ repeat.index }}"
              - alias: Check for errors
                repeat:
                  for_each:
                    - alias: Check custom translations
                      error: >-
                        {% set data = namespace(invalid=[]) %}
                        {% for key, sub_items in custom_translations.items() %}
                          {% if key not in strings['en'] %}
                            {% set data.invalid = data.invalid + [key] %}
                          {% else %}
                            {% for subkey, value in sub_items.items() %}
                              {%
                                if value is not string
                                or subkey not in strings['en'][key]
                              %}
                                {% set data.invalid = data.invalid + [subkey] %}
                              {% endif %}
                            {% endfor %}
                          {% endif %}
                        {% endfor %}
                        {{ data.invalid }}
                      message_id: "invalid_translations"
                      level: 1
                    - alias: Check missing ble sensors
                      error: >-
                        {{
                          (
                            'ble' in (
                              only_open_near
                              + [arrival_opening_method]
                              + close_when_disconnected_from
                            )
                            or ble_transmitter_entities | length > 0
                            or ble_scanner_switch != ""
                          )
                          and ble_entities | length == 0
                        }}
                      message_id: "missing_ble_entities"
                      level: 2
                    - alias: Check that ble is used if a device is set
                      error: >-
                        {%
                          if ble_entities | length > 0 and (
                            'ble' not in (
                              only_open_near
                              + [arrival_opening_method]
                              + close_when_disconnected_from
                            )
                          )
                        %}
                          {{
                            ble_entities
                            | map('state_attr', 'friendly_name')
                            | list
                          }}
                        {% else %}
                          {{ false }}
                        {% endif %}
                      message_id: "ble_not_used"
                      level: 0
                    - alias: Check missing wifi sensors
                      error: >-
                        {{
                          'wifi' in only_open_near
                          and wifi_devices | length == 0
                        }}
                      message_id: "missing_wifi_trackers"
                      level: 1
                    - alias: Check that wifi is used if a device is set
                      error: >-
                        {%
                          if (
                            wifi_devices | length > 0
                            and 'wifi' not in only_open_near
                          )
                        %}
                          {{
                            wifi_devices
                            | map('state_attr', 'friendly_name')
                            | list
                          }}
                        {% else %}
                          {{ false }}
                        {% endif %}
                      message_id: "wifi_not_used"
                      level: 0
                    - alias: Check that device trackers contain GPS data
                      error: >-
                        {% set data = namespace(invalid=[]) %}
                        {% for tracker in persons %}
                          {% set original_entity = tracker %}
                          {% if states[tracker].domain == 'person' %}
                            {% set trackers = state_attr(tracker, 'device_trackers') %}
                          {% else %}
                            {% set trackers = [tracker] %}
                          {% endif %}
                          {%
                            if trackers is none
                            or (
                              trackers
                              | select('is_state_attr', 'source_type', 'gps')
                              | list
                              | length
                              == 0
                            )
                          %}
                            {% set data.invalid = data.invalid + [original_entity] %}
                          {% endif %}
                        {% endfor %}
                        {{
                          data.invalid
                          | map('state_attr', 'friendly_name')
                          | list
                        }}
                      message_id: "missing_gps_data"
                      level: 2
                    - alias: Check that signal strength BLE devices report unknown by default
                      error: >-
                        {% if trigger.platform is none %}
                          {{
                            ble_entities
                            | expand
                            | selectattr(
                              'attributes.device_class',
                              'in',
                              ['signal_strength', 'distance']
                            )
                            | map(attribute='entity_id')
                            | select('is_state', 'unknown')
                            | map('state_attr', 'friendly_name')
                            | list
                          }}
                        {% else %}
                          {{ false }}
                        {% endif %}
                      message_id: "ble_not_unknown"
                      level: 1
                    - alias: Check that the user has a travel time sensor for his arrival
                      error: >-
                        {{
                          arrival_opening_method == 'time'
                          and travel_time_sensors | length != persons | length
                        }}
                      message_id: "missing_travel_time_sensors"
                      level: 2
                    - alias: Check that the activation zone is not too large
                      error: >-
                        {{
                          arrival_opening_method == 'zone'
                          and activation_zone > 400
                        }}
                      message_id: "zone_too_large"
                      level: 2
                    - alias: Check that itinerary sensors have a valid maximum length
                      error: >-
                        {{
                          itinerary_sensors
                          | expand
                          | selectattr('attributes.max', 'lessthan', 255)
                          | map(attribute='name')
                          | list
                        }}
                      message_id: "invalid_itinerary_sensor_length"
                      level: 2
                    - alias: Check that all per person sensors have been entered
                      error: >-
                        {% set persons_len = persons | length %}
                        {% set driving_len = driving_sensors | length %}
                        {{
                          not(
                            (
                              persons_len == 1
                              or persons_len == driving_len
                            )
                            and (
                              driving_len
                              <= itinerary_sensors | length
                            )
                            and travel_time_sensors | length <= persons_len
                            and wifi_devices | length <= driving_len
                            and ble_entities | length <= driving_len
                            and ble_transmitter_entities | length <= driving_len
                          )
                        }}
                      message_id: "invalid_per_person_sensors"
                      level: 2
                    - alias: Check that per person sensors are in the right order
                      error: >-
                        {%
                          set per_person_phone_sensors = [
                            driving_sensors,
                            ble_transmitter_entities,
                            wifi_devices
                          ]
                        %}
                        {% set data = namespace(invalid=[], entities_to_check=[]) %}
                        {% for device_idx in range(notify_devices | length) %}
                          {% set data.entities_to_check = [] %}
                          {% set related_entities = device_entities(
                              notify_devices[device_idx]
                            )
                          %}
                          {% for checker_idx in range(notify_devices | length) %}
                            {% if device_idx == checker_idx %}
                              {% continue %}
                            {% endif %}

                            {# Append device trackers to the list #}
                            {% if checker_idx < persons | length %}
                              {% set trackers = [persons[checker_idx]] %}
                              {% if states[trackers[0]].domain == 'person' %}
                                {% set trackers = state_attr(trackers[0], 'device_trackers') %}
                              {% endif %}
                              {% set data.entities_to_check = data.entities_to_check + trackers %}
                            {% endif %}

                            {# Append all other per person sensors #}
                            {% for sensors in per_person_phone_sensors %}
                              {% if sensors | length > checker_idx %}
                                {%
                                  set data.entities_to_check = (
                                    data.entities_to_check
                                    + [sensors[checker_idx]]
                                  )
                                %}
                              {% endif %}
                            {% endfor %}
                          {% endfor %}

                          {# Append sensors belonging to the wrong users #}
                            {%
                              if (
                                data.entities_to_check
                                | select('in', related_entities)
                                | list
                                | length
                                != 0
                              )
                            %}
                              {%
                                if persons | length == 1 < driving_sensors | length
                                and device_idx < itinerary_sensors | length
                              %}
                                {% set new_invalid = itinerary_sensors[device_idx] %}
                              {% elif device_idx < persons | length %}
                                {% set new_invalid = persons[device_idx] %}
                              {% else %}
                                {% set new_invalid = 'Unknown' %}
                              {% endif %}
                              {% set data.invalid = data.invalid + [new_invalid] %}
                            {% endif %}
                        {% endfor %}
                        {{
                          data.invalid
                          | map('state_attr', 'friendly_name')
                          | list
                        }}
                      message_id: "per_person_sensors_mismatch"
                      level: 2
                    - alias: Check that at least one gate has an area attached if a ble tracker uses area tracking
                      error: >-
                        {% if gate_areas | length < 1 %}
                          {{
                            ble_entities
                            | select('is_state_attr', 'device_class', 'bermuda__custom_device_class')
                            | map('state_attr', 'friendly_name')
                            | list
                          }}
                        {% else %}
                          {{ false }}
                        {% endif %}
                      message_id: "no_gate_area"
                      level: 2
                    - alias: Check that Wi-Fi device trackers does not contain GPS data
                      error: >-
                        {{
                          wifi_devices
                          | expand
                          | selectattr('attributes.source_type', 'equalto', 'gps')
                          | map(attribute='name')
                          | list
                        }}
                      message_id: "wifi_tracker_is_gps"
                      level: 1
                    - alias: Check that iBeacon transmitters are valid
                      error: >-
                        {{
                          ble_transmitter_entities
                          | expand
                          | rejectattr('attributes.options', 'contains', 'Transmitting')
                          | map(attribute='attributes.friendly_name')
                          | list
                        }}
                      message_id: "invalid_ibeacon_transmitter"
                      level: 2
                    - alias: Check that gps trackers are compatible if the location must be confirmed with gps
                      error: >-
                        {% if 'gps' in only_open_near or request_gps_location %}
                          {% set data = namespace(invalid=[]) %}
                          {% for person_idx in range(persons | length) %}
                            {% if states[persons[person_idx]].domain == 'person' %}
                              {% set trackers = state_attr(persons[person_idx], 'device_trackers') %}
                              {% if trackers is none %}
                                {% set trackers = [] %}
                              {% endif %}
                            {% else %}
                              {% set trackers = [persons[person_idx]] %}
                            {% endif %}
                            {%
                              set gps_trackers = (
                                trackers
                                | select('is_state_attr', 'source_type', 'gps')
                                | list
                              )
                            %}
                            {%
                              set wait_for_mobile_gps = (
                                person_idx < notify_devices | length
                                and (
                                  gps_trackers
                                  | select(
                                    'in',
                                    device_entities(
                                      notify_devices[person_idx]
                                    )
                                  )
                                  | list
                                  | length
                                  > 0
                                )
                              )
                            %}
                            {% set gps = namespace(not_mobile=[]) %}
                            {% for tracker in gps_trackers %}
                              {% set ids = device_attr(tracker, 'identifiers') %}
                              {%
                                if ids is none
                                or ids | first | first != 'mobile_app'
                              %}
                                {% set gps.not_mobile = gps.not_mobile + [tracker] %}
                              {% endif %}
                            {% endfor %}
                            {%
                              if gps.not_mobile | length < 1
                              and not wait_for_mobile_gps
                            %}
                              {% set data.invalid = data.invalid + [persons[person_idx]] %}
                            {% endif %}
                          {% endfor %}
                          {{
                            data.invalid
                            | map('state_attr', 'friendly_name')
                            | list
                          }}
                        {% else %}
                          {{ false }}
                        {% endif %}
                      message_id: "no_compatible_gps_tracker"
                      level: 1
                    - alias: Check custom translations depreciation
                      error: "{{ custom_translations_error }}"
                      message_id: "deprecated_translations"
                      level: 0
                    - alias: Check that travel time sensor update polling is disabled
                      error: >-
                        {%
                          if arrival_opening_method == 'time'
                          and behavior.arrival.opening != 'off'
                          and travel_time_rate != 'listen'
                        %}
                          {% set data = namespace(invalid=[]) %}
                          {% for sensor in travel_time_sensors %}
                            {%
                              if not (
                                sensor
                                | config_entry_id
                                | default(none)
                                | config_entry_attr('pref_disable_polling')
                              )
                            %}
                              {% set data.invalid = data.invalid + [sensor] %}
                            {% endif %}
                          {% endfor %}
                          {{
                            data.invalid
                            | map('state_attr', 'friendly_name')
                            | list
                          }}
                        {% else %}
                          {{ false }}
                        {% endif %}
                      message_id: "update_polling_enabled"
                      level: 2
                    - alias: Check that the travel time refresh function gives slow enough delays
                      error: >-
                        {{
                          [api_calls ~ '+'] if api_calls == 300
                          else [api_calls] if api_calls >= 120
                          else false
                        }}
                      message_id: "quick_refresh_function"
                      level: 2
                    - alias: Check that the travel time refresh rate is set to 'Listen' or 'Continuously' if GPS requests are enabled
                      error: >-
                        {{
                          request_gps_location
                          and travel_time_rate not in ['continuous', 'listen']
                        }}
                      message_id: "tt_not_continuous_listen"
                      level: 1
                    - alias: Check that a user is not using a gate behavior needing notifications if he does not have a notification device
                      error: >-
                        {%
                          if (
                            driving_sensors | length
                            <= notify_devices | length
                          )
                        %}
                          {{ false }}
                        {% else %}
                          {% set data = namespace(result=false) %}
                          {% for mode in behavior %}
                            {% for action in behavior[mode] %}
                              {% if behavior[mode][action] in ['timer', 'notif'] %}
                                {% set data.result = true %}
                                {% break %}
                              {% endif %}
                            {% endfor %}
                          {% endfor %}
                          {{ data.result }}
                        {% endif %}
                      message_id: "notif_behavior_no_device"
                      level: 1
                    - alias: Check that the transmitters come from the associated notification device
                      error: >-
                        {% set data = namespace(invalid=[]) %}
                        {% for transmitter_idx in range(ble_transmitter_entities | length) %}
                          {% set transmitter = ble_transmitter_entities[transmitter_idx] %}
                          {%
                            if (
                              transmitter_idx < notify_devices | length
                              and transmitter not in device_entities(
                                notify_devices[transmitter_idx]
                              )
                            )
                          %}
                            {% set data.invalid = data.invalid + [transmitter] %}
                          {% endif %}
                        {% endfor %}
                        {{ data.invalid }}
                      message_id: "wrong_transmitter_entities"
                      level: 1
                  sequence:
                    - alias: If a check failed
                      if:
                        - condition: template
                          value_template: >-
                            {% set error = repeat.item.error %}
                            {{ error != [] if error is list else error }}
                      then:
                        - alias: If the error level is higher than the current highest
                          if:
                            - condition: template
                              value_template: "{{ repeat.item.level > error_level }}"
                          then:
                            - alias: Save the new highest error level
                              variables:
                                error_level: "{{ repeat.item.level }}"
                        - alias: Get notification translation
                          variables:
                            message_id: "{{ repeat.item.message_id }}"
                            message: &get_message >-
                              {# Custom translation #}
                              {%
                                if 'message' in custom_translations
                                and message_id in custom_translations['message']
                              %}
                                {{ custom_translations['message'][message_id] }}

                              {# Selected language #}
                              {% elif message_id in strings[language]['message'] %}
                                {{ strings[language]['message'][message_id] }}

                              {# Fallback to english #}
                              {% else %}
                                {{ strings['en']['message'][message_id] }}
                              {% endif %}
                        - alias: If the error variable contains a list
                          if:
                            - condition: template
                              value_template: "{{ repeat.item.error is list }}"
                          then:
                            - alias: Format the string with error data
                              variables:
                                message: >-
                                  {{
                                    message.format(
                                      data=(
                                        ', '.join(repeat.item.error)
                                      )
                                    )
                                  }}
                        - alias: Append the error message to the list
                          variables:
                            messages: "{{ messages | union([message]) }}"
              - alias: If the config is valid
                if:
                  - condition: template
                    value_template: "{{ messages | length == 0 }}"
                then:
                  - alias: If the blueprint was triggered manually
                    if:
                      - condition: template
                        value_template: "{{ trigger.platform is none }}"
                    then:
                      - alias: Set message ids
                        variables:
                          title_id: "valid_config"
                          message_id: "valid_config"
                      - alias: Get notification translation
                        variables: &get_translation
                          message: *get_message
                          title: &get_title >-
                            {# Custom translation #}
                            {%
                              if 'title' in custom_translations
                              and title_id in custom_translations['title']
                            %}
                              {{ custom_translations['title'][title_id] }}

                            {# Selected language #}
                            {% elif title_id in strings[language]['title'] %}
                              {{ strings[language]['title'][title_id] }}

                            {# Fallback to english #}
                            {% else %}
                              {{ strings['en']['title'][title_id] }}
                            {% endif %}
                      - alias: Notify all users on the dashboard that the config is valid
                        action: persistent_notification.create
                        data:
                          title: "{{ title }}"
                          message: "{{ message }}"
                          notification_id: "{{ config_checker_tag }}"
                        continue_on_error: true
                    else:
                      - alias: Remove the previous dashboard notification
                        action: persistent_notification.dismiss
                        data:
                          notification_id: "{{ config_checker_tag }}"
                        continue_on_error: true
                else:
                  - alias: Build the notification
                    variables:
                      title_id: "invalid_config"
                      title: *get_title
                      message: "{{ '• ' ~ '\n• '.join(messages) }}"
                  - alias: Build the more info link
                    variables:
                      message_id: "more_info"
                      more_info: *get_message
                      link: "https://github.com/etiennec78/Home-Automation/tree/master/Blueprints/README.md#error-codes-table-%EF%B8%8F"
                      more_info_md: "[{{more_info}}]({{link}})"
                  - alias: Notify all users on the dashboard that the config is invalid
                    action: persistent_notification.create
                    data:
                      title: "{{ title }}"
                      message: "{{ message ~ '\n\n' ~ more_info_md }}"
                      notification_id: "{{ config_checker_tag }}"
                    continue_on_error: true
                  - alias: If the blueprint was not triggered manually
                    if:
                      - condition: template
                        value_template: "{{ trigger.platform is not none }}"
                    then:
                      - alias: If a notify service exists
                        if:
                          - condition: template
                            value_template: "{{ notify_service is not none }}"
                        then:
                          - alias: Notify the driver that his config is invalid
                            action: "{{ notify_service }}"
                            data:
                              title: "{{ title }}"
                              message: "{{ message }}"
                              data:
                                car_ui: true
                                notification_icon: mdi:hammer-wrench
                                channel: Automatic Gate
                                group: Automatic Gate
                                importance: high
                                priority: high
                                ttl: 0
                                push:
                                  sound:
                                    name: "default"
                                    critical: 1
                                tag: "{{ config_checker_tag }}"
                            continue_on_error: true
                          - sequence: &tts
                              - alias: Notify over TTS
                                action: "{{ notify_service }}"
                                data:
                                  message: TTS
                                  data:
                                    tts_text: >-
                                      {%
                                        set clean_title = (
                                          title
                                            | regex_replace('[\u2600-\u26FF]', '')
                                            | regex_replace('[\u2700-\u27BF]', '')
                                            | regex_replace('[\U0001F300-\U0001F5FF]', '')
                                            | regex_replace('[\U0001F600-\U0001F64F]', '')
                                            | regex_replace('[\U0001F680-\U0001F6FF]', '')
                                        ).strip()
                                      %}
                                      {% set separator = ' ' if clean_title[-1] in ['.', '!', '?'] else '. ' %}
                                      {{ clean_title ~ separator ~ message }}
                                    channel: Itinerary status
                                    importance: high
                                    priority: high
                                    ttl: 0
                                    media_stream: !input phone_tts_stream
                                enabled: !input phone_tts
                                continue_on_error: true
              - alias: Confirm that no error occured while the config checker was running
                variables:
                  successful_check: true
            continue_on_error: true
          - alias: If an error occured while the config checker was running
            if:
              - condition: template
                value_template: "{{ not successful_check }}"
            then:
              - alias: Set notification ids
                variables:
                  title_id: "invalid_config"
                  message_id: "something_went_wrong"
              - alias: Get notification translation
                variables: *get_translation
              - alias: Notify all users on the dashboard that an error occured
                action: persistent_notification.create
                data:
                  title: "{{ title }}"
                  message: "{{ message }}"
                  notification_id: "{{ config_checker_tag }}"
                continue_on_error: true
              - stop: Config checker failed
                error: true
      - alias: Check whether the blueprint was triggered by a driving sensor and tests passed
        variables:
          errored: >-
            {{
              trigger.platform is not none
              and trigger.id == 'vehicle_started'
              and (not error_checker_ran or error_level < 2)
            }}
      - alias: Only continue if the check above passed (it is named 'errored' to avoid raising an error when leaving the sequence)
        condition: template
        value_template: "{{ errored }}"
      - choose:
          - alias: If last automation iteration ended less than 5s ago
            conditions:
              - condition: template
                value_template: "{{ states[itinerary_sensor].last_updated + timedelta(seconds=5) > now() }}"
            sequence:
              - alias: Update the quick triggers counter
                variables:
                  update:
                    status: null
                    error: "triggered_frequently"
                    quick_triggers: "{{ itinerary_value.quick_triggers + 1 }}"
                  itinerary_value: "{{ itinerary_value | combine(update) }}"
              - alias: Save the quick triggers counter
                action: input_text.set_value
                target:
                  entity_id: "{{ itinerary_sensor }}"
                data:
                  value: "{{ itinerary_value | to_json }}"
              - alias: Save if the blueprint recently tried closing the gate
                variables:
                  tried_closing_recently: >-
                    {{
                      itinerary_value.last_closed
                        | as_datetime
                        + timedelta(seconds=lead_time)
                        > now()
                    }}
              - choose:
                  - alias: If the gate may be closing on the driver
                    conditions:
                      - condition: template
                        value_template: "{{ tried_closing_recently }}"
                      - alias: If the user wants his gate to reopen if the driving sensor quickly triggers
                        condition: template
                        value_template: !input quick_triggers_reopen_gate
                      - alias: If the gate was not closed manually
                        condition: template
                        value_template: "{{ itinerary_value.auto_closed }}"
                      - alias: If one of the gates is closing/closed
                        condition: template
                        value_template: &gate_closed >-
                          {{
                            gate
                            | select('is_state', ['off', 'closed', 'closing'])
                            | list
                            != []
                          }}
                    sequence:
                      - alias: Reopen each gate to avoid closing on the driver
                        repeat: &open_gates
                          for_each: >-
                            {{
                              gate
                              | select('is_state', ['off', 'closed', 'closing'])
                              | list
                            }}
                          sequence:
                            - alias: Get the action to call
                              variables:
                                action: >-
                                  {% if states[repeat.item].domain == 'switch' %}
                                    turn_on
                                  {% elif states[repeat.item].domain == 'cover' %}
                                    {% set features = state_attr(repeat.item, 'supported_features') %}
                                    {%
                                      if partial_open_position != 100
                                      and (
                                        (0 if features is none else features)
                                        | bitwise_and(4) == 4
                                      )
                                    %}
                                      set_cover_position
                                    {% else %}
                                      open_cover
                                    {% endif %}
                                  {% endif %}
                                data: >-
                                  {{
                                    {'position': partial_open_position}
                                    if action == 'set_cover_position'
                                    else {}
                                  }}
                            - action: "{{ states[repeat.item].domain ~ '.' ~ action }}"
                              data: "{{ data }}"
                              target:
                                entity_id: "{{ repeat.item }}"
                      - alias: Set notification ids
                        variables:
                          title_id: "gate_reopening"
                          message_id: "triggered_frequently"
                      - alias: Get notification translation
                        variables: *get_translation
                      - alias: Log error
                        action: system_log.write
                        data:
                          level: error
                          message: "{{ message }}"
                          logger: blueprints.etiennec78.automatic_gate
                      - alias: If a notify service exists
                        if:
                          - condition: template
                            value_template: "{{ notify_service is not none }}"
                        then:
                          - alias: Notify driver that the gate is reopening
                            action: "{{ notify_service }}"
                            data:
                              title: "{{ title }}"
                              message: "{{ message }}"
                              data: &notification_data
                                car_ui: true
                                notification_icon: mdi:alert-circle
                                color: "#00bcd4"
                                channel: Itinerary Status
                                group: Itinerary Status
                                importance: high
                                priority: high
                                ttl: 0
                                push:
                                  sound:
                                    name: "default"
                                    critical: 1
                                tag: itinerary-status
                            continue_on_error: true
                          - sequence: *tts
                      - stop: Blueprint triggered closing on the user
                        error: true
                  - alias: If this is the third time the error occurs in a row
                    conditions:
                      - condition: template
                        value_template: "{{ itinerary_value.quick_triggers > 2 }}"
                    sequence:
                      - alias: Set error id
                        variables:
                          message_id: "disabled_triggered_frequently"
                      - alias: Disable the blueprint
                        sequence: &disable_blueprint
                          - alias: Get title id
                            variables:
                              title_id: "disabled"
                          - alias: Get notification translation
                            variables: *get_translation
                          - alias: Format the error message
                            variables:
                              message: >-
                                {{
                                  message.format(
                                    quick_triggers=itinerary_value.quick_triggers
                                  )
                                }}
                          - alias: Log error
                            action: system_log.write
                            data:
                              level: error
                              message: "{{ message }}"
                              logger: blueprints.etiennec78.automatic_gate
                          - alias: If a notify service exists
                            if:
                              - condition: template
                                value_template: "{{ notify_service is not none }}"
                            then:
                              - alias: Notify driver that the blueprint is disabling itself
                                action: "{{ notify_service }}"
                                data:
                                  title: "{{ title }}"
                                  message: "{{ message }}"
                                  data: *notification_data
                                continue_on_error: true
                              - sequence: *tts
                          - alias: Notify all users on the dashboard that the blueprint has disabled itself
                            action: persistent_notification.create
                            data:
                              title: "{{ title }}"
                              message: "{{ message }}"
                            continue_on_error: true
                          - alias: Disable the blueprint
                            action: automation.turn_off
                            target:
                              entity_id: "{{ this.entity_id }}"
                  - alias: If the gate recently tried to close but the gate does not need to reopen
                    conditions:
                      - condition: template
                        value_template: "{{ tried_closing_recently }}"
                    sequence:
                      - alias: Set notification ids
                        variables:
                          title_id: "itinerary_canceled"
                          message_id: "triggered_frequently"
                      - alias: Get notification translation
                        variables: *get_translation
                      - alias: Log error
                        action: system_log.write
                        data:
                          level: error
                          message: "{{ message }}"
                          logger: blueprints.etiennec78.automatic_gate
                      - alias: If a notify service exists
                        if:
                          - condition: template
                            value_template: "{{ notify_service is not none }}"
                        then:
                          - alias: Notify driver of itinerary cancelation
                            action: "{{ notify_service }}"
                            data:
                              title: "{{ title }}"
                              message: "{{ message }}"
                              data: *notification_data
                            continue_on_error: true
                          - sequence: *tts
                      - stop: The gate recently tried to close
          - alias: If last automation instance ended more than 10 minutes ago and its status is not none
            conditions:
              - condition: template
                value_template: >-
                  {{
                    itinerary_value.status is not none
                    and states[itinerary_sensor].last_updated
                    + timedelta(minutes=10)
                    < now()
                  }}
            sequence:
              - alias: Set message id
                variables:
                  message_id: "automation_crashed"
              - alias: Get notification translation
                variables:
                  message: *get_message
              - alias: Log error
                action: system_log.write
                data:
                  level: error
                  message: "{{ message }}"
                  logger: blueprints.etiennec78.automatic_gate
              - alias: Notify of the issue on the dashboard
                action: persistent_notification.create
                data:
                  title: "{{ blueprint_name }}"
                  message: "{{ message }}"
              - alias: If a notify service exists
                if:
                  - condition: template
                    value_template: "{{ notify_service is not none }}"
                then:
                  - alias: Send the error message
                    action: "{{ notify_service }}"
                    data:
                      title: "{{ blueprint_name }}"
                      message: "{{ message }}"
          - alias: If the quick triggers counter is not at 0
            conditions:
              - condition: template
                value_template: "{{ itinerary_value.quick_triggers != 0 }}"
            sequence:
              - alias: Reset the quick triggers counter
                variables:
                  update:
                    error: null
                    quick_triggers: 0
                  itinerary_value: "{{ itinerary_value | combine(update) }}"
              - alias: Save the quick triggers counter
                action: input_text.set_value
                target:
                  entity_id: "{{ itinerary_sensor }}"
                data:
                  value: "{{ itinerary_value | to_json }}"
      - alias: If there is no notification service
        if:
          - condition: template
            value_template: "{{ notify_service is none }}"
        then:
          - alias: Change behaviors needing a notification service to auto
            variables:
              behavior: >-
                {% set data = namespace(behaviors={}) %}
                {% for key, val in behavior.items() %}
                  {% set inner = namespace(value={}) %}
                  {% for subkey, subval in val.items() %}
                    {% set inner.value = inner.value | combine({
                      subkey: 'auto' if subval in ['notif', 'timer'] else subval
                    }) %}
                  {% endfor %}
                  {% set data.behaviors = data.behaviors | combine({ key: inner.value }) %}
                {% endfor %}
                {{ data.behaviors }}
          - alias: Clear a previous blueprint notification
            action: "{{ notify_service }}"
            data: &clear_notification
              message: clear_notification
              data:
                tag: itinerary-status
            continue_on_error: true
      - alias: Get which sensor the blueprint should wait to confirm the driver's presence
        variables:
          gps_trackers: >-
            {% if states[driver].domain == 'person' %}
              {% set trackers = state_attr(driver, 'device_trackers') %}
              {% if trackers is none %}
                {% set trackers = [] %}
              {% endif %}
            {% else %}
              {% set trackers = [driver] %}
            {% endif %}
            {{
              trackers
              | select('is_state_attr', 'source_type', 'gps')
              | list
            }}
          wait_for_mobile_gps: >-
            {{
              notify_service is not none
              and (
                gps_trackers
                | select(
                  'in',
                  device_entities(
                    notify_devices[idx]
                  )
                )
                | list
                | length
                > 0
              )
            }}
          other_gps_to_wait_for: >-
            {% set data = namespace(not_mobile=[]) %}
            {% for tracker in gps_trackers %}
              {% set ids = device_attr(tracker, 'identifiers') %}
              {%
                if ids is none
                or ids | first | first != 'mobile_app'
              %}
                {% set data.not_mobile = data.not_mobile + [tracker] %}
              {% endif %}
            {% endfor %}
            {{ data.not_mobile }}
          wait_for_gps: >-
            {{
              'gps' in only_open_near
              and (
                wait_for_mobile_gps
                or other_gps_to_wait_for | length > 0
              )
            }}
          wait_for_wifi: "{{ 'wifi' in only_open_near and wifi_devices | length > idx }}"
          wait_for_ble: "{{ 'ble' in only_open_near and ble_entities | length > idx }}"
          ble_started: false
      - alias: Get whether the user is leaving or arriving
        variables: &get_itinerary_mode
          departure: >-
            {{
              is_state(
                driver, [
                  state_attr(gate_location, 'friendly_name'),
                  states[gate_location].object_id
                ]
              )
            }}
          eta_zone: &activation_zone_in_condition >-
            {% if state_attr(driver, 'gps_accuracy') is none %}
              {% set accuracy = 100 %}
            {% else %}
              {% set accuracy = state_attr(driver, 'gps_accuracy') %}
            {% endif %}
            {% set gate_distance = distance(driver, gate_location)*1000 - accuracy %}

            {{ gate_distance < activation_zone }}
          arrival: "{{ not eta_zone }}"
      - alias: If the user wants to confirm his presence before starting the blueprint
        if:
          - condition: template
            value_template: >-
              {{
                wait_for_gps
                or departure and (
                  wait_for_wifi
                  or wait_for_ble
                )
              }}
        then:
          - alias: Store values for the next sequence
            variables:
              start_timestamp: "{{ now() | as_timestamp }}"
              received_timestamp: null
              old_location_id: "{{ states[driver].context.id }}"
              gates_were_opened: &all_gates_open >-
                {{
                  gate
                  | select('is_state', ['on', 'open', 'opening'])
                  | list
                  == gate
                }}
              lock_departure: false
              gps_confirmed: >-
                {{
                  states[driver].last_updated
                  + timedelta(seconds=gps_outdated_delay)
                  >= now()
                }}
          - alias: If the GPS request on startup is enabled and the location is outdated
            if:
              - condition: template
                value_template: "{{ wait_for_gps and not gps_confirmed }}"
            then:
              - alias: If one of the device trackers related to the driver is his phone
                if:
                  - condition: template
                    value_template: "{{ wait_for_mobile_gps }}"
                then: &gps_request
                  - alias: Update the driver's location with a mobile app location request
                    action: "{{ notify_service }}"
                    data:
                      message: request_location_update
                      data:
                        tag: "gps-request-{{this.attributes.id}}"
                        priority: high
                        importance: high
                        confirmation: true
                    continue_on_error: true
              - alias: Update the driver's location by refreshing his gps device trackers
                action: homeassistant.update_entity
                data:
                  entity_id: "{{ other_gps_to_wait_for }}"
                continue_on_error: true
          - alias: If a BLE tracker has been provided
            if:
              - condition: template
                value_template: "{{ departure and wait_for_ble }}"
            then:
              - alias: Update the BLE tracker
                action: homeassistant.update_entity
                data:
                  entity_id: "{{ ble_entities[idx] }}"
                continue_on_error: true
          - alias: If a wifi tracker has been provided
            if:
              - condition: template
                value_template: "{{ departure and wait_for_wifi }}"
            then:
              - alias: Update the Wi-Fi device tracker
                action: homeassistant.update_entity
                data:
                  entity_id: "{{ wifi_devices[idx] }}"
                continue_on_error: true
          - alias: Repeat while the location has not been confirmed
            repeat:
              while:
                - condition: template
                  value_template: >-
                    {{
                      not (
                        gps_confirmed and (
                          arrival
                          or not wait_for_wifi and not wait_for_ble
                        )
                        or departure
                        and (
                          wait_for_ble and (
                            states(ble_entities[idx]) | is_number
                            or is_state(ble_entities[idx], 'home')
                            or state_attr(ble_entities[idx], 'area_id') in gate_areas
                          )
                          or wait_for_wifi and (
                            states(wifi_devices[idx]) | is_number
                            or is_state(wifi_devices[idx], 'home')
                          )
                        )
                      )
                    }}
              sequence:
                - alias: If the user is on departure and BLE devices should turn on
                  if:
                    - condition: template
                      value_template: "{{ departure and wait_for_ble }}"
                  then: &start_ble
                    - alias: Only continue if BLE devices were not already started
                      condition: template
                      value_template: "{{ not ble_started }}"
                    - alias: Initialize BLE related variables
                      variables:
                        ble_started: true
                        ibeacon_restore_messages: []
                        scanner_turned_on: false
                    - alias: If the driver has a transmitter entity and a notification device set
                      if:
                        - condition: template
                          value_template: >-
                            {{
                              notify_service is not none
                              and ble_transmitter_entity is not none
                            }}
                      then:
                        - alias: Check for incorrect iBeacon transmitter states
                          repeat:
                            for_each:
                              - alias: Check that bluetooth is on
                                condition: >-
                                  {{
                                    is_state(
                                      ble_transmitter_entity,
                                      'Bluetooth is turned off'
                                    )
                                  }}
                                message: command_bluetooth
                                message_data:
                                  command: turn_on
                                restore_message_data:
                                  command: turn_off
                              - alias: Check that the iBeacon transmitter is on
                                condition: >-
                                  {{
                                    is_state(
                                      ble_transmitter_entity,
                                      ['Stopped', 'Bluetooth is turned off']
                                    )
                                  }}
                                message: command_ble_transmitter
                                message_data:
                                  command: turn_on
                                restore_message_data:
                                  command: turn_off
                              - alias: Check for the transmitting power
                                condition: >-
                                  {{
                                    not is_state_attr(
                                      ble_transmitter_entity,
                                      'Transmitting power',
                                      'high'
                                    )
                                  }}
                                message: command_ble_transmitter
                                message_data:
                                  command: ble_set_transmit_power
                                  ble_transmit: ble_transmit_high
                                restore_message_data:
                                  command: ble_set_transmit_power
                                  ble_transmit: >-
                                    {{
                                      'ble_transmit_' ~ (
                                        state_attr(
                                          ble_transmitter_entity,
                                          'Transmitting power'
                                        )
                                        | regex_replace('([a-z])([A-Z])', '\\1_\\2')
                                        | lower
                                      )
                                    }}
                              - alias: Check for the advertising mode
                                condition: >-
                                  {{
                                    not is_state_attr(
                                      ble_transmitter_entity,
                                      'Advertise mode',
                                      'lowLatency'
                                    )
                                  }}
                                message: command_ble_transmitter
                                message_data:
                                  command: ble_set_advertise_mode
                                  ble_advertise: ble_advertise_low_latency
                                restore_message_data:
                                  command: ble_set_advertise_mode
                                  ble_advertise: >-
                                    {{
                                      'ble_advertise_' ~ (
                                        state_attr(
                                          ble_transmitter_entity,
                                          'Advertise mode'
                                        )
                                        | regex_replace('([a-z])([A-Z])', '\\1_\\2')
                                        | lower
                                      )
                                    }}
                            sequence:
                              - alias: Only continue if the state is incorrect
                                condition: template
                                value_template: "{{ repeat.item.condition }}"
                              - alias: Send a request to the phone to fix its iBeacon state
                                action: "{{ notify_service }}"
                                data:
                                  message: "{{ repeat.item.message }}"
                                  data: >-
                                    {{
                                      repeat.item.message_data
                                      | combine(
                                        {
                                          'importance': 'high',
                                          'priority':'high'
                                        }
                                      )
                                    }}
                                continue_on_error: true
                              - alias: Add a message to send to the phone when the iBeacon states need to be restored
                                variables:
                                  ibeacon_restore_messages: >-
                                    {{
                                      ibeacon_restore_messages
                                      + [{
                                        'message': repeat.item.message,
                                        'data': repeat.item.restore_message_data
                                      }]
                                    }}
                    - alias: If the BLE scanner is off
                      if:
                        - condition: template
                          value_template: >-
                            {{
                              ble_scanner_switch != ''
                              and is_state(ble_scanner_switch, 'off')
                            }}
                      then:
                        - alias: Turn on the BLE scanner
                          action: switch.turn_on
                          target:
                            entity_id: "{{ ble_scanner_switch }}"
                          continue_on_error: true
                        - alias: Remember that the blueprint turned on the scanner
                          variables:
                            scanner_turned_on: true
                - alias: Wait for the location to be confirmed, the notification to be received, and the vehicle to be stopped
                  wait_for_trigger:
                    - alias: New position
                      id: position
                      trigger: event
                      event_type: state_changed
                      event_data:
                        entity_id: "{{ driver }}"
                    - alias: Notification received
                      trigger: event
                      id: notification_received
                      event_type: mobile_app_notification_received
                      event_data:
                        tag: "gps-request-{{this.attributes.id}}"
                      enabled: "{{ not ios_device }}"
                    - alias: WiFi in range
                      trigger: template
                      id: wifi_in_range
                      value_template: >-
                        {{
                          states(wifi_devices[idx]) | is_number
                          or is_state(wifi_devices[idx], 'home')
                        }}
                      enabled: "{{ departure and wait_for_wifi }}"
                    - alias: BLE in range
                      trigger: template
                      id: ble_in_range
                      value_template: >-
                        {{
                          states(ble_entities[idx]) | is_number
                          or is_state(ble_entities[idx], 'home')
                          or state_attr(ble_entities[idx], 'area_id') in gate_areas
                        }}
                      enabled: "{{ departure and wait_for_ble }}"
                    - alias: Vehicle stopped
                      id: vehicle_stopped
                      trigger: template
                      value_template: "{{ is_state(driving_sensor, 'off') }}"
                    - alias: Gates opened
                      trigger: template
                      id: gate_opened
                      value_template: *all_gates_open
                      enabled: "{{ not gates_were_opened }}"
                    - alias: Gates closed
                      trigger: template
                      id: gate_closed
                      value_template: &all_gates_closed >-
                        {{
                          gate
                          | select('is_state', ['off', 'closed', 'closing'])
                          | list
                          == gate
                        }}
                      enabled: "{{ gates_were_opened }}"
                  timeout: >-
                    {{
                      only_open_near_timeout
                      + start_timestamp
                      - now() | as_timestamp
                    }}
                - alias: Refresh variables depending on the trigger
                  choose:
                    - alias: Triggered by a new GPS location
                      conditions:
                        - condition: template
                          value_template: "{{ wait.completed and wait.trigger.id == 'position' }}"
                      sequence:
                        - alias: Save the previous location
                          variables:
                            was_departure: "{{ departure }}"
                        - alias: Get whether the user is leaving or arriving
                          variables: *get_itinerary_mode
                        - alias: Get whether the user has entered the activation zone
                          variables:
                            entered_activation_zone: >-
                              {{
                                eta_zone and not departure
                                or (
                                  wait.trigger.event.data.old_state.context.id != old_location_id
                                  and arrival and was_departure
                                )
                              }}
                            gps_confirmed: true
                    - alias: Triggered by the gate closing
                      conditions:
                        - condition: template
                          value_template: "{{ wait.completed and wait.trigger.id == 'gate_closed' }}"
                      sequence:
                        - alias: Get whether the gate was automatically closed
                          variables:
                            auto_closed: >-
                              {% set data = namespace(auto_closed=false) %}
                              {% for sensor in itinerary_sensors %}
                                {%
                                  set value = (
                                    states(sensor)
                                    | from_json(default_itinerary_sensor_value)
                                  )
                                %}
                                {%
                                  if (
                                    value.last_closed
                                    | as_datetime
                                    + timedelta(seconds=10)
                                    > now()
                                  )
                                  and value.auto_closed
                                %}
                                  {% set data.auto_closed = true %}
                                  {% break %}
                                {% endif %}
                              {% endfor %}
                              {{ data.auto_closed }}
                - choose:
                    - alias: If the blueprint needs to stop
                      conditions:
                        - condition: template
                          value_template: >-
                            {{
                              not wait.completed
                              or wait.trigger.id == 'vehicle_stopped'
                              or wait.trigger.id == 'position' and entered_activation_zone
                              or (
                                departure and (
                                  wait.trigger.id == 'gate_closed' and not auto_closed
                                  or lock_departure
                                )
                              )
                            }}
                      sequence:
                        - alias: Set the error id
                          variables:
                            message_id: >-
                              {% if not wait.completed %}
                                {%
                                  if (
                                    wait_for_gps
                                    and not ios_device
                                    and received_timestamp is not none
                                    and (
                                      arrival
                                      or not wait_for_wifi and not wait_for_ble
                                    )
                                  )
                                %}
                                  got_no_gps_data
                                {% else %}
                                  {% if departure %}
                                    not_home
                                  {% else %}
                                    location_not_confirmed
                                  {% endif %}
                                {% endif %}
                              {% elif entered_activation_zone %}
                                too_close
                              {% elif departure and lock_departure %}
                                gate_closed
                              {% else %}
                                {{ wait.trigger.id }}
                              {% endif %}
                        - alias: If an error should be raised
                          if:
                            - condition: template
                              value_template: >-
                                {{
                                  not departure
                                  or behavior.departure.opening != 'off'
                                  or behavior.departure.closing != 'off'
                                }}
                          then:
                            - alias: Create error
                              sequence: &create_error
                                - alias: Set title id
                                  variables:
                                    title_id: "itinerary_canceled"
                                - alias: If a notify service exists and the user should be notified
                                  if:
                                    - condition: template
                                      value_template: "{{ notify_service is not none and not silent_error }}"
                                  then:
                                    - alias: Get notification translation
                                      variables: *get_translation
                                    - alias: Notify driver of itinerary cancelation
                                      action: "{{ notify_service }}"
                                      data:
                                        title: "{{ title }}"
                                        message: "{{ message }}"
                                        data: *notification_data
                                      continue_on_error: true
                                    - sequence: *tts
                                - alias: Mark error in driver itinerary sensor
                                  variables:
                                    update:
                                      status: null
                                      error: "{{ message_id }}"
                                    itinerary_value: "{{ itinerary_value | combine(update) }}"
                                - alias: Save the itinerary status
                                  action: input_text.set_value
                                  target:
                                    entity_id: "{{ itinerary_sensor }}"
                                  data:
                                    value: "{{ itinerary_value | to_json }}"
                        - alias: Restore BLE devices
                          sequence: &restore_ble
                            - alias: Only continue if BLE devices were started
                              condition: template
                              value_template: "{{ ble_started }}"
                            - alias: Restore iBeacon transmitter states
                              repeat:
                                for_each: "{{ ibeacon_restore_messages }}"
                                sequence:
                                  - alias: Send a notification to restore the iBeacon previous state
                                    action: "{{ notify_service }}"
                                    data: >-
                                      {{
                                        repeat.item
                                        | combine(
                                          {
                                            'data': {
                                              'importance': 'high',
                                              'priority':'high'
                                            }
                                          },
                                          recursive=True
                                        )
                                      }}
                                    continue_on_error: true
                            - alias: Check if there is another driver near the gate
                              variables:
                                someone_near_gate: >-
                                  {% set data = namespace(result=false) %}
                                  {% for sensor_idx in range(itinerary_sensors | length) %}
                                    {% if sensor_idx != idx %}
                                      {%
                                        set value = (
                                          states(
                                            itinerary_sensors[sensor_idx]
                                          )
                                          | from_json(default_itinerary_sensor_value)
                                        )
                                      %}
                                      {% if value.status in ['on_approach', 'leaving'] %}
                                        {% set data.result = true %}
                                        {% break %}
                                      {% endif %}
                                    {% endif %}
                                  {% endfor %}
                                  {{ data.result }}
                            - alias: If BLE scanner switch set, and doesn't need to stay on
                              if:
                                - condition: template
                                  value_template: >-
                                    {{
                                      ble_scanner_switch != ''
                                      and scanner_turned_on
                                      and not someone_near_gate
                                    }}
                              then:
                                - alias: Turn off BLE scanner
                                  action: switch.turn_off
                                  target:
                                    entity_id: "{{ ble_scanner_switch }}"
                                  continue_on_error: true
                            - alias: Reset the ble_started variable
                              variables:
                                ble_started: false
                        - stop: The location was not confirmed
                    - alias: If the notification was received
                      conditions:
                        - condition: template
                          value_template: "{{ wait.trigger.id == 'notification_received' }}"
                      sequence:
                        - alias: Save the timestamp of when the notification was received
                          variables:
                            received_timestamp: "{{ now() | as_timestamp }}"
                    - alias: If someone opened all gates
                      conditions:
                        - condition: template
                          value_template: "{{ wait.trigger.id == 'gate_opened' }}"
                      sequence:
                        - alias: Now fait for the gates closing
                          variables:
                            gates_were_opened: true
                    - alias: If someone manually closed all gate
                      conditions:
                        - condition: template
                          value_template: "{{ wait.trigger.id == 'gate_closed' and not auto_closed }}"
                      sequence:
                        - alias: Do not let the gates open on departure
                          variables:
                            lock_departure: true
      - alias: If BLE devices were started but are not needed anymore
        if:
          - condition: template
            value_template: >-
              {{
                ble_started and not (
                  departure
                  and 'ble' in close_when_disconnected_from
                  and ble_entities | length > idx
                )
              }}
        then:
          - alias: Restore BLE devices
            sequence: *restore_ble
      - alias: Get whether the driver is at the gate location
        variables:
          departure_mode: >-
            {{
              is_state(
                driver, [
                  state_attr(gate_location, 'friendly_name'),
                  states[gate_location].object_id
                ]
              )
            }}
      - alias: Repeat if the driver is at gate location
        repeat:
          count: "{{ 2 if departure_mode else 1 }}"
          sequence:
            - alias: Get whether the driver is at the gate location
              variables:
                departure_mode: >-
                  {{
                    is_state(
                      driver, [
                        state_attr(gate_location, 'friendly_name'),
                        states[gate_location].object_id
                      ]
                    )
                  }}
            - choose:
                - alias: If driver at gate location
                  conditions:
                    - condition: template
                      value_template: "{{ departure_mode }}"
                  sequence:
                    #############
                    # DEPARTURE #
                    #############

                    - alias: Initialize departure mode variables
                      variables:
                        itinerary_mode: "departure"
                    - alias: Set the itinerary status to "leaving"
                      variables:
                        update:
                          status: leaving
                          error: null
                        itinerary_value: "{{ itinerary_value | combine(update) }}"
                    - alias: Save the itinerary status
                      action: input_text.set_value
                      target:
                        entity_id: "{{ itinerary_sensor }}"
                      data:
                        value: "{{ itinerary_value | to_json }}"
                    - alias: If the gate should ask for a confirmation before opening
                      if:
                        - alias: If the user doesn't want his gate to open automatically if someone just closed it
                          condition: template
                          value_template: !input ask_reopen_manually_closed
                        - alias: If the opening behavior is automatic
                          condition: template
                          value_template: "{{ behavior.departure.opening in ['timer', 'auto'] }}"
                        - alias: If the gate was recently closed manually
                          condition: template
                          value_template: >-
                            {%
                              set data = namespace(
                                recently_closed=false,
                                auto_closed=false
                              )
                            %}
                            {% for gate_entity in gate %}
                              {%
                                if (
                                  is_state(gate_entity, ['off', 'closed', 'closing'])
                                  and states[gate_entity].last_updated
                                    + timedelta(minutes=2)
                                    > now()
                                )
                              %}
                                {% set data.recently_closed = true %}
                                {% break %}
                              {% endif %}
                            {% endfor %}
                            {% if data.recently_closed %}
                              {% for sensor in itinerary_sensors %}
                                {%
                                  set value = (
                                    states(sensor)
                                    | from_json(default_itinerary_sensor_value)
                                  )
                                %}
                                {%
                                  if (
                                    value.last_closed
                                    | as_datetime
                                    + timedelta(minutes=2)
                                    > now()
                                  )
                                  and value.auto_closed
                                %}
                                  {% set data.auto_closed = true %}
                                  {% break %}
                                {% endif %}
                              {% endfor %}
                            {% endif %}
                            {{ data.recently_closed and not data.auto_closed }}
                      then:
                        - alias: Change the departure opening behavior to notification request
                          variables:
                            behavior: >-
                              {{
                                behavior
                                | combine(
                                  {'departure': {'opening': 'notif'}},
                                  recursive=True
                                )
                              }}
                - alias: Stop if driver started driving in activation zone
                  conditions:
                    - condition: template
                      value_template: *activation_zone_in_condition
                    - condition: template
                      value_template: "{{ repeat.first }}"
                  sequence:
                    - alias: Set error id
                      variables:
                        message_id: "too_close"
                    - alias: Send a silent error if the behaviors are set to off
                      variables:
                        silent_error: >-
                          {{
                            behavior.departure.opening == 'off'
                            and behavior.departure.closing == 'off'
                          }}
                    - alias: Create error
                      sequence: *create_error
                    - stop: Started too close to home
              default:
                ###########
                # ARRIVAL #
                ###########

                - alias: Initialize arrival mode variables
                  variables:
                    itinerary_mode: "arrival"
                - alias: Initialize travel time variables
                  variables:
                    opening_time: null
                    last_refresh_timestamp: 0
                    next_refresh: 0
                    return_zone: "{{ distance(driver, gate_location) }}"
                    next_gps_refresh_ts: null
                    api_calls: 0
                    quick_tt_updates: 0
                    last_quick_tt_update: null
                    failed_updates: 0
                - alias: Set the itinerary status to "arriving"
                  variables:
                    update:
                      status: arriving
                      error: null
                    itinerary_value: "{{ itinerary_value | combine(update) }}"
                - alias: Save the itinerary status
                  action: input_text.set_value
                  target:
                    entity_id: "{{ itinerary_sensor }}"
                  data:
                    value: "{{ itinerary_value | to_json }}"
                - alias: If the arrival opening behavior is set to off but the opening mode is set to 'time' and no travel time sensor was given
                  if:
                    - condition: template
                      value_template: >-
                        {{
                          behavior.arrival.opening == 'off'
                          and arrival_opening_method == 'time'
                          and travel_time_sensor is none
                        }}
                  then:
                    - alias: Set the opening mode to zone
                      variables:
                        arrival_opening_method: "zone"
                - alias: If a notify service exists and the user wants to be notified
                  if:
                    - condition: template
                      value_template: >-
                        {{
                          notify_service is not none
                          and itinerary_started_notif
                          and repeat.first
                        }}
                  then:
                    - alias: Set notification ids
                      variables:
                        title_id: "itinerary_started"
                        message_id: "vehicle_started"
                    - alias: Get notification translation
                      variables: *get_translation
                    - alias: Notify driver of itinerary start
                      action: "{{ notify_service }}"
                      data:
                        title: "{{ title }}"
                        message: "{{ message }}"
                        data:
                          <<: *notification_data
                          notification_icon: mdi:map-check
                      continue_on_error: true
                    - sequence: *tts
                - alias: Initialize variables for the following sequence
                  variables:
                    in_activation_zone: false
                - alias: Repeat while driver still driving and the opening should not be triggered yet
                  repeat:
                    while:
                      - alias: Still driving
                        condition: template
                        value_template: "{{ is_state(driving_sensor, 'on') }}"
                      - alias: Gate should not open yet
                        condition: template
                        value_template: "{{ itinerary_value.status != 'on_approach' }}"
                    sequence:
                      - alias: Set the timeout for the next 'wait for trigger' action
                        variables:
                          timeouts:
                            opening: >-
                              {{
                                opening_time - now() | as_timestamp
                                if (
                                  in_activation_zone
                                  and arrival_opening_method == 'time'
                                  and opening_time is not none
                                )
                                else MAX_INT
                              }}
                            gps_request: >-
                              {{
                                next_gps_refresh_ts - now() | as_timestamp
                                if request_gps_location and next_gps_refresh_ts is not none
                                else MAX_INT
                              }}
                            timed_out: >-
                              {{
                                timeout_delay * 60
                                if in_activation_zone and travel_time_rate != 'once'
                                else MAX_INT
                              }}
                          timeout_type: >-
                            {{
                              timeouts
                              | items
                              | sort(attribute='1')
                              | first
                              | first
                            }}
                          timeout: "{{ max(timeouts[timeout_type], 0) }}"
                      - alias: Wait for new driver position, vehicle left, travel time update or opening trigger
                        wait_for_trigger:
                          - alias: New position
                            id: position
                            trigger: event
                            event_type: state_changed
                            event_data:
                              entity_id: "{{ driver }}"
                          - alias: Vehicle stopped
                            id: vehicle_stopped
                            trigger: template
                            value_template: "{{ is_state(driving_sensor, 'off') }}"
                          - alias: Travel time sensor updated
                            id: travel_time
                            trigger: event
                            event_type: state_changed
                            event_data:
                              entity_id: "{{ travel_time_sensor }}"
                            enabled: >-
                              {{
                                travel_time_sensor is not none
                                and (
                                  request_gps_location
                                  or (
                                    in_activation_zone
                                    and arrival_opening_method == 'time'
                                    and travel_time_rate == 'listen'
                                  )
                                )
                              }}
                          - alias: Reachable BLE device
                            trigger: template
                            id: ble_in_range
                            value_template: >-
                              {{
                                states(ble_entities[idx]) | is_number
                                or is_state(ble_entities[idx], 'home')
                                or state_attr(ble_entities[idx], 'area_id') in gate_areas
                              }}
                            enabled: >-
                              {{
                                in_activation_zone
                                and arrival_opening_method == 'ble'
                                and idx < ble_entities | length
                              }}
                        timeout: "{{ timeout }}"
                      - alias: Get whether the user is in the activation zone
                        variables:
                          was_in_zone: "{{ in_activation_zone }}"
                          in_activation_zone: *activation_zone_in_condition
                      - alias: If the user just entered the activazion zone
                        if:
                          - condition: template
                            value_template: "{{ in_activation_zone and not was_in_zone }}"
                        then:
                          - alias: Reset opening time variable
                            variables:
                              opening_time: null
                          - alias: Force a GPS and travel time update
                            variables:
                              next_gps_refresh_ts: "{{ now() | as_timestamp }}"
                              next_refresh: >-
                                {{
                                  max(
                                    2 - now() | as_timestamp + last_refresh_timestamp,
                                    0
                                  )
                                }}
                          - alias: Only continue if ble devices need to be turned on
                            condition: template
                            value_template: "{{ arrival_opening_method == 'ble' }}"
                          - alias: Turn on BLE devices
                            sequence: *start_ble
                      - alias: If the travel time may need to be calculated
                        if:
                          - condition: template
                            value_template: >-
                              {{
                                wait.completed
                                and (
                                  wait.trigger.id == 'travel_time'
                                  or (
                                    wait.trigger.id == 'position'
                                    and (
                                      travel_time_rate == 'continuous'
                                      or in_activation_zone and (
                                        travel_time_rate == 'near-home'
                                        or (
                                          travel_time_rate == 'once'
                                          and opening_time is none
                                          and failed_updates < 20
                                        )
                                      )
                                    )
                                  )
                                )
                              }}
                        then:
                          - alias: If the refresh rate is not set to 'Listen'
                            if:
                              - condition: template
                                value_template: "{{ travel_time_rate != 'listen' }}"
                            then:
                              - alias: Only continue if the travel time should be updated
                                condition: template
                                value_template: "{{ last_refresh_timestamp + next_refresh < now() | as_timestamp }}"
                              - alias: Get the current distance of the user from the gate
                                variables:
                                  current_distance: "{{ distance(driver, gate_location) }}"
                              - alias: Manage the return zone size
                                variables:
                                  return_zone: >
                                    {% set diff = return_zone - current_distance %}
                                    {% if diff > 10 %}
                                      {{ current_distance + 5 }}
                                    {% elif diff < -10 %}
                                      {{ current_distance - 5 }}
                                    {% else %}
                                      {{ return_zone }}
                                    {% endif %}
                              - alias: Only continue if the user is driving towards the activation zone
                                condition: or
                                conditions:
                                  - alias: Direction check disabled
                                    condition: not
                                    conditions:
                                      - condition: template
                                        value_template: !input pause_refresh_driving_away
                                  - alias: Driving towards activation zone
                                    condition: template
                                    value_template: "{{ current_distance - return_zone < 5 }}"
                                  - alias: Driver in activation zone
                                    condition: template
                                    value_template: *activation_zone_in_condition
                              - alias: Stop if travel time sensor does not exist
                                if:
                                  - condition: template
                                    value_template: "{{ states[travel_time_sensor] is none }}"
                                then:
                                  - alias: Set error id
                                    variables:
                                      message_id: "invalid_travel_time_sensor"
                                  - alias: Create error
                                    sequence: *create_error
                                  - alias: Log error
                                    action: system_log.write
                                    data:
                                      level: error
                                      message: "{{ message }}"
                                      logger: blueprints.etiennec78.automatic_gate
                                  - stop: Travel time sensor does not exist
                                    error: true
                              - alias: If the travel time sensor was updated more than 2s ago and the API was called less than 300 times
                                if:
                                  - condition: template
                                    value_template: >-
                                      {{
                                        now()
                                        - states[travel_time_sensor].last_updated
                                        > timedelta(seconds=2)
                                        and api_calls < 300
                                      }}
                                then:
                                  - alias: Update travel time
                                    action: homeassistant.update_entity
                                    target:
                                      entity_id: "{{ travel_time_sensor }}"
                                    continue_on_error: true
                                  - alias: Increment the API calls counter
                                    variables:
                                      api_calls: "{{ api_calls + 1 }}"
                                else:
                                  - alias: If the last quick update was a long time ago
                                    if:
                                      - condition: template
                                        value_template: >-
                                          {{
                                            last_quick_tt_update is not none
                                            and (
                                              last_quick_tt_update
                                              | as_datetime
                                              + timedelta(seconds=5)
                                              > now()
                                            )
                                          }}
                                    then:
                                      - alias: Note that the travel time sensor tried to update too quickly
                                        variables:
                                          quick_tt_updates: "{{ quick_tt_updates + 1 }}"
                                    else:
                                      - alias: Reset the quick travel time updates counter
                                        variables:
                                          quick_tt_updates: 1
                                  - alias: Reset the last quick update variable
                                    variables:
                                      last_quick_tt_update: "{{ now() }}"
                                  - alias: If 20 travel time updates were too quick or the API was called more than 300 times
                                    if:
                                      - condition: template
                                        value_template: "{{ quick_tt_updates > 20 or api_calls > 300 }}"
                                    then:
                                      - alias: Mark error in driver itinerary sensor
                                        variables:
                                          update:
                                            status: null
                                            error: updated_frequently
                                          itinerary_value: "{{ itinerary_value | combine(update) }}"
                                      - alias: Save the itinerary status
                                        action: input_text.set_value
                                        target:
                                          entity_id: "{{ itinerary_sensor }}"
                                        data:
                                          value: "{{ itinerary_value | to_json }}"
                                      - alias: Set error id
                                        variables:
                                          message_id: "disabled_updated_frequently"
                                      - alias: Get notification translation
                                        variables: *get_translation
                                      - alias: Disable the blueprint
                                        sequence: *disable_blueprint
                          - alias: If travel time just got updated
                            if:
                              - condition: template
                                value_template: >-
                                  {{
                                    now()
                                    - states[travel_time_sensor].last_updated
                                    < timedelta(seconds=2)
                                  }}
                            then:
                              - alias: If the travel time sensor is not unknown or unavailable
                                if:
                                  - condition: template
                                    value_template: "{{ travel_time_sensor | has_value }}"
                                then:
                                  - alias: Convert travel time to seconds
                                    variables:
                                      travel_time_duration: >-
                                        {% if state_attr(travel_time_sensor, 'duration') | is_number %}
                                          {{ state_attr(travel_time_sensor, 'duration') | float * 60 }}
                                        {% elif is_state_attr(travel_time_sensor, 'unit_of_measurement', 'min') %}
                                          {{ states(travel_time_sensor) | float * 60 }}
                                        {% elif is_state_attr(travel_time_sensor, 'unit_of_measurement', 's') %}
                                          {{ states(travel_time_sensor) | float }}
                                        {% elif is_state_attr(travel_time_sensor, 'device_class', 'timestamp') %}
                                          {{
                                            states(travel_time_sensor) | as_timestamp
                                            - states[travel_time_sensor].last_updated | as_timestamp
                                          }}
                                        {% else %}
                                          unknown
                                        {% endif %}
                                  - alias: Stop if travel time integration is not supported
                                    if:
                                      - condition: template
                                        value_template: "{{ travel_time_duration == 'unknown' }}"
                                    then:
                                      - alias: Set error id
                                        variables:
                                          message_id: "unsupported_tt_integration"
                                      - alias: Create error
                                        sequence: *create_error
                                      - alias: Log error
                                        action: system_log.write
                                        data:
                                          level: error
                                          message: "{{ message }}"
                                          logger: blueprints.etiennec78.automatic_gate
                                      - stop: Travel time integration not supported
                                        error: true
                                  - alias: Only continue if the duration is positive
                                    condition: template
                                    value_template: "{{ travel_time_duration >= 0 }}"
                                  - alias: Set the opening time
                                    variables:
                                      opening_time: >-
                                        {{
                                          states[travel_time_sensor].last_updated | as_timestamp
                                            + travel_time_duration
                                            - lead_time
                                            - (timer_opening if behavior.arrival.opening == 'timer' else 0)
                                        }}
                                  - alias: Set a timer for the gate opening (or max int value if travel time sensor is unknown and no previous eta was stored) and for next gps refresh
                                    variables:
                                      seconds_before_opening: "{{ opening_time - now() | as_timestamp }}"
                                      next_gps_refresh: !input gps_request_refresh_function
                                      next_gps_refresh_ts: >-
                                        {{
                                          now() | as_timestamp + next_gps_refresh
                                          if next_gps_refresh_ts is none
                                          else next_gps_refresh_ts
                                        }}
                                  - alias: Only continue if the refresh rate is not set to 'Listen'
                                    condition: template
                                    value_template: "{{ travel_time_rate != 'listen' }}"
                                  - alias: Set the next travel time refresh timestamp
                                    variables:
                                      next_refresh: !input refresh_function
                                      last_refresh_timestamp: "{{ now() | as_timestamp }}"
                                else:
                                  - alias: Add 1 to the failed updates counter
                                    variables:
                                      failed_updates: "{{ failed_updates + 1 }}"
                      - choose:
                          - alias: If a GPS request must be sent
                            conditions:
                              - condition: template
                                value_template: "{{ not wait.completed and timeout_type == 'gps_request' }}"
                            sequence:
                              - alias: If an opening time is planned
                                if:
                                  - condition: template
                                    value_template: "{{ opening_time is not none }}"
                                then:
                                  - alias: Get the next gps refresh timestamp
                                    variables:
                                      seconds_before_opening: "{{ opening_time - now() | as_timestamp }}"
                                      outdated_delay: !input gps_outdated_function
                                      next_gps_refresh: !input gps_request_refresh_function
                                      next_gps_refresh_ts: "{{ now() | as_timestamp + next_gps_refresh }}"
                                else:
                                  - alias: Remove the planned gps request
                                    variables:
                                      next_gps_refresh_ts: null
                              - alias: Only continue if the GPS location is outdated
                                condition: template
                                value_template: >-
                                  {{
                                    opening_time is not none
                                    and (
                                      now()
                                      - states[driver].last_updated
                                      > timedelta(seconds=outdated_delay)
                                    )
                                  }}
                              - sequence: *gps_request
                          - alias: If the gate should open
                            conditions:
                              - condition: template
                                value_template: >-
                                  {{
                                    in_activation_zone
                                    and (
                                      arrival_opening_method == 'zone'
                                      or not wait.completed and timeout_type == 'opening'
                                      or wait.completed and wait.trigger.id == 'ble_in_range'
                                    )
                                  }}
                            sequence:
                              - alias: Set the itinerary status to "on_approach"
                                variables:
                                  update:
                                    status: on_approach
                                  itinerary_value: "{{ itinerary_value | combine(update) }}"
                              - alias: Save the itinerary status
                                action: input_text.set_value
                                target:
                                  entity_id: "{{ itinerary_sensor }}"
                                data:
                                  value: "{{ itinerary_value | to_json }}"
                              - alias: Restore BLE devices if needed
                                sequence: *restore_ble
                        default:
                          - alias: Try to get a message error id
                            variables:
                              message_id: >-
                                {% if not wait.completed %}
                                  {{ timeout_type }}
                                {%
                                  elif is_state(
                                    driver,
                                    [
                                      state_attr(gate_location, 'friendly_name'),
                                      states[gate_location].object_id
                                    ]
                                  )
                                  and arrival_opening_method == 'time'
                                  and opening_time is none
                                %}
                                  travel_time_did_not_respond
                                {%
                                  elif driver in (
                                    expand(forbidden_zones)
                                    | map(attribute='entity_id')
                                    | list
                                  )
                                %}
                                  forbidden_zone
                                {% elif is_state(driving_sensor, 'off') %}
                                  vehicle_stopped
                                {% else %}
                                  {{ none }}
                                {% endif %}
                          - alias: If an error needs to be raised
                            if:
                              - condition: template
                                value_template: "{{ message_id is not none }}"
                            then:
                              - alias: Send a silent error if the behaviors are set to off
                                variables:
                                  silent_error: >-
                                    {{
                                      behavior.arrival.opening == 'off'
                                      and behavior.arrival.closing == 'off'
                                    }}
                              - alias: Create error
                                sequence: *create_error
                              - alias: Restore BLE devices if needed
                                sequence: *restore_ble
                              - alias: If the error is critical
                                if:
                                  - condition: template
                                    value_template: "{{ message_id in critical_errors }}"
                                then:
                                  - alias: Log error
                                    action: system_log.write
                                    data:
                                      level: error
                                      message: "{{ message }}"
                                      logger: blueprints.etiennec78.automatic_gate
                                  - stop: Critical error
                                    error: true
                              - stop: Itinerary canceled

            ##############################
            # OPENING & CLOSING SEQUENCE #
            ##############################
            - alias: Get the opening/closing behaviors
              variables:
                opening_behavior: "{{ behavior[itinerary_mode].opening }}"
                closing_behavior: "{{ behavior[itinerary_mode].closing }}"
            - alias: If one of the gates is closed
              if:
                - condition: template
                  value_template: *gate_closed
              then:
                - alias: Initialize a variable to wait for the phone to receive the notification before starting the timer
                  variables:
                    wait_notif_reception: "{{ not ios_device and opening_behavior == 'timer' }}"
                - alias: If opening behavior is set to cancelable timer or notification request
                  if:
                    - condition: template
                      value_template: "{{ opening_behavior in ['timer', 'notif'] }}"
                  then:
                    - alias: Get button translation
                      variables: &get_button_translations
                        button_ids:
                          - "open"
                          - "cancel"
                        buttons: >-
                          {% set data = namespace(buttons=[]) %}
                          {% for button_id in button_ids %}
                            {# Custom translation #}
                            {%
                              if 'button' in custom_translations
                              and button_id in custom_translations['button']
                            %}
                              {% set translation = custom_translations['button'][button_id] %}

                            {# Selected language #}
                            {% elif button_id in strings[language]['button'] %}
                              {% set translation = strings[language]['button'][button_id] %}

                            {# Fallback to english #}
                            {% else %}
                              {% set translation = strings['en']['button'][button_id] %}
                            {% endif %}

                            {% set data.buttons = data.buttons + [translation] %}

                          {% endfor %}
                          {{ data.buttons }}
                    - alias: Build notification actions
                      variables:
                        opening_action:
                          action: "{{ opening_order_id }}"
                          title: "{{ buttons[0] }}"
                          icon: sfsymbols:lock.open
                        canceling_action:
                          action: "{{ canceling_order_id }}"
                          title: "{{ buttons[1] }}"
                          icon: sfsymbols:xmark
                    - choose:
                        - alias: If opening behavior is set to cancelable timer
                          conditions:
                            - condition: template
                              value_template: "{{ opening_behavior == 'timer' }}"
                          sequence:
                            - alias: Set title id
                              variables:
                                title_id: "timer_opening"
                            - alias: Format the notification
                              variables:
                                notification_data:
                                  <<: *notification_data
                                  notification_icon: mdi:timer-lock-open
                                  sticky: true
                                  persistent: true
                                  confirmation: "{{ not ios_device }}"
                                  timeout: "{{ timer_opening }}"
                                  chronometer: true
                                  when: "{{ timer_opening }}"
                                  when_relative: true
                                  actions:
                                    - "{{ canceling_action }}"
                                    - "{{ opening_action }}"
                        - alias: If opening behavior is set to notification request
                          conditions:
                            - condition: template
                              value_template: "{{ opening_behavior == 'notif' }}"
                          sequence:
                            - alias: Set title id
                              variables:
                                title_id: "open_gate"
                            - alias: Format the notification
                              variables:
                                notification_data:
                                  <<: *notification_data
                                  notification_icon: mdi:lock-question
                                  sticky: true
                                  persistent: true
                                  actions:
                                    - "{{ opening_action }}"
                                    - "{{ canceling_action }}"
                    - alias: Set message id
                      variables:
                        message_id: "{{ 'leaving_home' if departure_mode else 'soon_arrived' }}"
                    - alias: Get notification translation
                      variables: *get_translation
                    - alias: Send the timer notification or opening request
                      action: "{{ notify_service }}"
                      data:
                        title: "{{ title }}"
                        message: "{{ message }}"
                        data: "{{ notification_data }}"
                    - sequence: *tts
                - alias: If opening behavior is not set to full auto
                  if:
                    - condition: template
                      value_template: "{{ opening_behavior != 'auto' }}"
                  then:
                    - alias: Set an empty trigger id
                      variables:
                        trigger:
                          completed: true
                    - alias: Listen for events a second time if the first event was a notification received confirmation
                      repeat:
                        until:
                          - condition: template
                            value_template: >-
                              {{
                                not wait.completed
                                or wait.trigger.id != 'notification_received'
                              }}
                        sequence:
                          - alias: Wait for events before opening the gate or canceling the itinerary
                            wait_for_trigger:
                              - alias: Manual opening
                                trigger: template
                                id: manual
                                value_template: *all_gates_open
                              - alias: Vehicle left
                                trigger: template
                                id: vehicle_stopped
                                value_template: "{{ is_state(driving_sensor, 'off') }}"
                              - alias: Activation zone left
                                trigger: template
                                id: vehicle_away
                                value_template: &activation_zone_out_trigger >-
                                  {% if state_attr(driver, 'gps_accuracy') is none %}
                                    {% set accuracy = 100 %}
                                  {% else %}
                                    {% set accuracy = state_attr(driver, 'gps_accuracy') %}
                                  {% endif %}
                                  {% set gate_distance = distance(driver, gate_location)*1000 - accuracy %}

                                  {{ gate_distance > activation_zone }}
                              - alias: Forbidden zone entered
                                trigger: template
                                id: forbidden_zone
                                value_template: &in_forbidden_zone >-
                                  {{
                                    driver in (
                                      expand(forbidden_zones)
                                      | map(attribute='entity_id')
                                      | list
                                    )
                                  }}
                              - alias: Opening button pressed
                                trigger: event
                                id: opening_order
                                event_type: mobile_app_notification_action
                                event_data:
                                  action: "{{ opening_order_id }}"
                              - alias: Canceling button pressed
                                trigger: event
                                id: canceling_order
                                event_type: mobile_app_notification_action
                                event_data:
                                  action: "{{ canceling_order_id }}"
                              - alias: Notification received
                                trigger: event
                                id: notification_received
                                event_type: mobile_app_notification_received
                                event_data:
                                  action_2_key: "{{ opening_order_id }}"
                                enabled: "{{ wait_notif_reception }}"
                            timeout: >-
                              {% if opening_behavior == 'timer' %}
                                {{ timer_opening }}
                              {% else %}
                                {{ MAX_INT }}
                              {% endif %}
                          - choose:
                              - alias: If the timer ran out but not in timer mode
                                conditions:
                                  - condition: template
                                    value_template: >-
                                      {{
                                        not wait.completed
                                        and opening_behavior != 'timer'
                                      }}
                                sequence:
                                  - stop: This timer shouldn't reach zero !
                                    error: true
                              - alias: If the notification was received
                                conditions:
                                  - condition: template
                                    value_template: >-
                                      {{
                                        wait.completed
                                        and wait.trigger.id == 'notification_received'
                                      }}
                                sequence:
                                  - alias: Stop waiting for notification reception
                                    variables:
                                      wait_notif_reception: false
                              - alias: If an error needs to be raised
                                conditions:
                                  - condition: template
                                    value_template: >-
                                      {{
                                        wait.completed
                                        and wait.trigger.id in [
                                          'vehicle_stopped',
                                          'vehicle_away',
                                          'forbidden_zone',
                                          'canceling_order'
                                        ]
                                      }}
                                sequence:
                                  - alias: Set error id
                                    variables:
                                      message_id: "{{ wait.trigger.id }}"
                                  - alias: Send a silent error if the behavior is set to off
                                    variables:
                                      silent_error: "{{ opening_behavior == 'off' }}"
                                  - alias: Create error
                                    sequence: *create_error
                                  - alias: Restore BLE devices
                                    sequence: *restore_ble
                                  - stop: Opening canceled
                              - alias: If the opening behavior is set to notif or timer
                                conditions:
                                  - condition: template
                                    value_template: "{{ opening_behavior in ['timer', 'notif'] }}"
                                sequence:
                                  - alias: Remove opening notification
                                    action: "{{ notify_service }}"
                                    data: *clear_notification
                                    continue_on_error: true
                - alias: If opening behavior is not set to off
                  if:
                    - condition: template
                      value_template: "{{ opening_behavior != 'off' }}"
                  then:
                    - alias: Open each gate
                      repeat: *open_gates
            - alias: If one of the gates is open
              if:
                - condition: or
                  conditions:
                    - alias: Gate open
                      condition: template
                      value_template: &gate_open >-
                        {{
                          gate
                          | select('is_state', ['on', 'open', 'opening'])
                          | list
                          != []
                        }}
                    - alias: Opening request sent but not acknowledged yet
                      condition: template
                      value_template: >-
                        {{
                          gate
                          | reject('has_value')
                          | list
                          != gate
                          and opening_behavior != 'off'
                        }}
              then:
                - alias: If BLE devices are needed to close the gate
                  if:
                    - condition: template
                      value_template: >-
                        {{
                          departure_mode
                          and 'ble' in close_when_disconnected_from
                          and ble_entities | length > idx
                        }}
                  then: *start_ble
                - alias: Set variables for the following repeat sequence
                  variables:
                    break: "{{ closing_behavior in ['auto', 'off'] }}"
                    suggest_closing: >-
                      {{
                        closing_behavior == 'notif'
                        and departure_mode
                        and 'ble' not in close_when_disconnected_from
                      }}
                    wait_trigger_start: "{{ now() | as_timestamp }}"
                    wait_notif_reception: "{{ not ios_device and closing_behavior == 'timer' }}"
                    timer_reset_timestamp: null
                    timer_notif_sent: false
                    timeouts:
                      closing_suggestion: !input suggest_closing_after
                      safety_delay: "{{ safety_delay * 60 }}"
                      timer: !input timer_closing
                      default: "{{ MAX_INT }}"
                - alias: Wait for events at least once, then while the gate closing has not been triggered
                  repeat:
                    until: "{{ break }}"
                    sequence:
                      - alias: Set the timeout
                        variables:
                          timeout_type: >-
                            {% if repeat.first %}
                              {% if suggest_closing %}
                                closing_suggestion
                              {% else %}
                                safety_delay
                              {% endif %}
                            {% else %}
                              {% if closing_behavior == 'timer' %}
                                timer
                              {% else %}
                                {% if security_notif_override %}
                                  safety_delay
                                {% else %}
                                  default
                                {% endif %}
                              {% endif %}
                            {% endif %}
                          trigger_timeout: >-
                            {% if timeout_type == 'safety_delay' %}
                              {% set start_time = wait_trigger_start %}
                            {% elif timer_reset_timestamp is not none %}
                              {% set start_time = timer_reset_timestamp %}
                            {% else %}
                              {% set start_time = none %}
                            {% endif %}
                            {%
                              set remaining_timeout = timeouts[timeout_type]
                            %}
                            {% if start_time is not none %}
                              {% set remaining_timeout = (
                                  remaining_timeout
                                  + start_time
                                  - now() | as_timestamp
                                )
                              %}
                            {% endif %}
                            {{ max(remaining_timeout, 0) }}
                      - alias: Wait for events before closing the gate
                        wait_for_trigger:
                          - alias: Manual closing
                            trigger: template
                            id: manual
                            value_template: *all_gates_closed
                          - alias: BLE out of reach
                            trigger: template
                            id: ble_out_of_range
                            value_template: >-
                              {{
                                is_state(ble_entities[idx], ['unknown', 'not_home'])
                                or (
                                  ble_entities[idx] in states
                                  and 'area_id' in states[ble_entities[idx]].attributes
                                  and state_attr(ble_entities[idx], 'area_id') is none
                                )
                              }}
                            enabled: >-
                              {{
                                departure_mode
                                and 'ble' in close_when_disconnected_from
                                and idx < ble_entities | length
                              }}
                            for: !input ble_away_timeout
                          - alias: Vehicle left
                            trigger: template
                            id: vehicle_stopped
                            value_template: "{{ is_state(driving_sensor, 'off') }}"
                          - alias: Vehicle restarted
                            trigger: template
                            id: vehicle_restarted
                            value_template: "{{ is_state(driving_sensor, 'on') }}"
                          - alias: Activation zone left
                            trigger: template
                            id: vehicle_away
                            value_template: *activation_zone_out_trigger
                          - alias: Forbidden zone
                            trigger: template
                            id: forbidden_zone
                            value_template: *in_forbidden_zone
                          - alias: Closing button pressed
                            trigger: event
                            id: closing_order
                            event_type: mobile_app_notification_action
                            event_data:
                              action: "{{ closing_order_id }}"
                          - alias: Canceling button pressed
                            trigger: event
                            id: canceling_order
                            event_type: mobile_app_notification_action
                            event_data:
                              action: "{{ canceling_order_id }}"
                          - alias: Notification received
                            trigger: event
                            id: notification_received
                            event_type: mobile_app_notification_received
                            event_data:
                              action_2_key: "{{ closing_order_id }}"
                            enabled: "{{ wait_notif_reception }}"
                        timeout:
                          seconds: "{{ trigger_timeout }}"
                      - alias: If a safety feature needs to change the closing behavior from notif to timer
                        if:
                          - condition: template
                            value_template: >-
                              {{
                                security_notif_override
                                and closing_behavior == 'notif'
                                and (
                                  not wait.completed
                                    and timeout_type == 'safety_delay'
                                  or wait.completed and wait.trigger.id in [
                                    'vehicle_stopped',
                                    'vehicle_away',
                                    'forbidden_zone',
                                  ]
                                )
                              }}
                        then:
                          - alias: Change closing behavior to timer
                            variables:
                              closing_behavior: "timer"
                              timer_reset_timestamp: "{{ now() | as_timestamp }}"
                              wait_notif_reception: "{{ not ios_device }}"
                      - choose:
                          - alias: If this is the first loop or the behavior just switched to timer
                            conditions:
                              - condition: template
                                value_template: >-
                                  {{
                                    repeat.first
                                    or closing_behavior == 'timer'
                                      and not timer_notif_sent
                                  }}
                            sequence:
                              - alias: Restore BLE devices
                                sequence: *restore_ble
                              - alias: Set message id
                                variables:
                                  message_id: >-
                                    {% if not wait.completed %}
                                      {% if timeout_type == 'safety_delay' %}
                                        {{ 'did_not_' ~ ('leave' if departure_mode else 'arrive') }}
                                      {% else %}
                                        {{ timeout_type }}
                                      {% endif %}
                                    {% elif wait.trigger.id in ['manual', 'closing_order'] %}
                                      {{ none }}
                                    {%
                                      elif wait.trigger.id == 'vehicle_stopped'
                                      and not departure_mode
                                    %}
                                      arrived
                                    {% else %}
                                      {{ wait.trigger.id }}
                                    {% endif %}
                              - alias: If a closing notification needs to be sent
                                if:
                                  - condition: template
                                    value_template: "{{ not break }}"
                                then:
                                  - alias: Get button translation
                                    variables:
                                      button_ids:
                                        - "close"
                                        - "cancel"
                                      <<: *get_button_translations
                                  - alias: Build notification actions
                                    variables:
                                      closing_action:
                                        action: "{{ closing_order_id }}"
                                        title: "{{ buttons[0] }}"
                                        icon: sfsymbols:lock
                                      canceling_action:
                                        action: "{{ canceling_order_id }}"
                                        title: "{{ buttons[1] }}"
                                        icon: sfsymbols:xmark
                                  - choose:
                                      - alias: If closing behavior is set to cancelable timer
                                        conditions:
                                          - condition: template
                                            value_template: "{{ closing_behavior == 'timer' }}"
                                        sequence:
                                          - alias: Set title id
                                            variables:
                                              title_id: "timer_closing"
                                          - alias: Format the notification
                                            variables:
                                              notification_data:
                                                <<: *notification_data
                                                notification_icon: mdi:lock-question
                                                sticky: true
                                                persistent: true
                                                confirmation: "{{ not ios_device }}"
                                                timeout: "{{ timer_closing }}"
                                                chronometer: true
                                                when: "{{ timer_closing }}"
                                                when_relative: true
                                                actions:
                                                  - "{{ canceling_action }}"
                                                  - "{{ closing_action }}"
                                          - alias: Remember that the timer notification was sent
                                            variables:
                                              timer_notif_sent: true
                                      - alias: If closing behavior is set to notification request
                                        conditions:
                                          - condition: template
                                            value_template: "{{ closing_behavior == 'notif' }}"
                                        sequence:
                                          - alias: Set title id
                                            variables:
                                              title_id: "close_gate"
                                          - alias: Format the notification
                                            variables:
                                              notification_data:
                                                <<: *notification_data
                                                notification_icon: mdi:lock-question
                                                sticky: true
                                                persistent: true
                                                actions:
                                                  - "{{ closing_action }}"
                                                  - "{{ canceling_action }}"
                                  - alias: Get notification translation
                                    variables: *get_translation
                                  - alias: Send the timer notification or closing request
                                    action: "{{ notify_service }}"
                                    data:
                                      title: "{{ title }}"
                                      message: "{{ message }}"
                                      data: "{{ notification_data }}"
                                  - sequence: *tts
                          - alias: If the trigger needs to close the gate
                            conditions:
                              - condition: template
                                value_template: >-
                                  {{
                                    wait.completed and wait.trigger.id in [
                                      'manual', 'closing_order'
                                    ]
                                    or (
                                      not wait.completed
                                      and timeout_type == 'timer'
                                    )
                                  }}
                            sequence:
                              - alias: Break the loop
                                variables:
                                  break: true
                          - alias: If the itinerary needs to be canceled
                            conditions:
                              - condition: template
                                value_template: "{{ wait.trigger.id == 'canceling_order' }}"
                            sequence:
                              - alias: Set error id
                                variables:
                                  message_id: "canceling_order"
                              - alias: Create error
                                sequence: *create_error
                              - stop: Closing canceled
                          - alias: If the vehicle was restarted
                            conditions:
                              - condition: template
                                value_template: "{{ wait.trigger.id == 'vehicle_restarted' }}"
                            sequence:
                              - stop: Letting the new instance take over
                - alias: If gate not closed manually
                  if:
                    - condition: template
                      value_template: "{{ not wait.completed or wait.trigger.id != 'manual' }}"
                  then:
                    - alias: Update the last closed variable
                      variables:
                        update:
                          last_closed: "{{ now() | as_timestamp | int }}"
                          auto_closed: "{{ not wait.completed or wait.trigger.id != 'closing_order' }}"
                        itinerary_value: "{{ itinerary_value | combine(update) }}"
                    - alias: If gate closing is enabled
                      if:
                        - condition: template
                          value_template: "{{ closing_behavior != 'off' }}"
                      then:
                        - alias: Get other drivers near the gate
                          variables:
                            drivers_near_gate: >-
                              {% set data = namespace(drivers_near_gate=[]) %}
                              {% for sensor_idx in range(itinerary_sensors | length) %}
                                {% if sensor_idx != idx %}
                                  {%
                                    set value = (
                                      states(
                                        itinerary_sensors[sensor_idx]
                                      )
                                      | from_json(default_itinerary_sensor_value)
                                    )
                                  %}
                                  {% if value.status in ['on_approach', 'leaving'] %}
                                    {% if sensor_idx < persons | length %}
                                      {% set name_sensor = persons[sensor_idx] %}
                                    {% else %}
                                      {% set name_sensor = itinerary_sensors[sensor_idx] %}
                                    {% endif %}
                                    {%
                                      set data.drivers_near_gate = data.drivers_near_gate + [
                                        state_attr(name_sensor, 'friendly_name')
                                      ]
                                    %}
                                  {% endif %}
                                {% endif %}
                              {% endfor %}
                              {{ data.drivers_near_gate }}
                        - alias: If someone is currently approaching or leaving
                          if:
                            - condition: template
                              value_template: "{{ drivers_near_gate != [] }}"
                            - condition: template
                              value_template: *gate_open
                          then:
                            - alias: Set notification ids
                              variables:
                                title_id: "awaiting"
                                message_id: "awaiting"
                            - alias: Get notification translation
                              variables: *get_translation
                            - alias: Format title with names of drivers near gate
                              variables:
                                title: >-
                                  {{
                                    title.format(
                                      awaited_persons=(
                                        drivers_near_gate | join(', ')
                                      )
                                    )
                                  }}
                            - alias: If a notify service exists
                              if:
                                - condition: template
                                  value_template: "{{ notify_service is not none }}"
                              then:
                                - alias: Notify driver that gate will wait for next person
                                  action: "{{ notify_service }}"
                                  data:
                                    title: "{{ title }}"
                                    message: "{{ message }}"
                                    data:
                                      <<: *notification_data
                                      notification_icon: mdi:sleep
                                  continue_on_error: true
                                - sequence: *tts
                            - alias: Wait for manual gate closing
                              wait_for_trigger:
                                - alias: Manual closing
                                  trigger: template
                                  value_template: *all_gates_closed
                            - alias: If a notify service exists
                              if:
                                - condition: template
                                  value_template: "{{ notify_service is not none }}"
                              then:
                                - alias: Remove awaiting user notification
                                  action: "{{ notify_service }}"
                                  data: *clear_notification
                                  continue_on_error: true
                          else:
                            - alias: If an error needs to be raised
                              if:
                                - condition: template
                                  value_template: >-
                                    {{
                                      closing_behavior == 'auto'
                                      and message_id is not none
                                      and message_id != 'arrived'
                                    }}
                              then:
                                - alias: Create error
                                  sequence: *create_error
                            - alias: Close all gates
                              repeat:
                                for_each: >-
                                  {{
                                    gate
                                    | select('is_state', ['on', 'open', 'opening'])
                                    | list
                                  }}
                                sequence:
                                  - action: >-
                                      {% if states[repeat.item].domain == 'switch' %}
                                        switch.turn_off
                                      {% elif states[repeat.item].domain == 'cover' %}
                                        cover.close_cover
                                      {% endif %}
                                    target:
                                      entity_id: "{{ repeat.item }}"
            - alias: If a notification needs to be cleared
              if:
                - condition: template
                  value_template: >-
                    {{
                      closing_behavior in ['timer', 'notif']
                      or (
                        not departure_mode
                        and itinerary_started_notif
                        and opening_behavior not in ['timer', 'notif']
                      )
                    }}
              then:
                - alias: Remove closing notification
                  action: "{{ notify_service }}"
                  data: *clear_notification
                  continue_on_error: true
            - alias: If the driver is leaving or has arrived home
              if:
                - condition: or
                  conditions:
                    - condition: template
                      value_template: "{{ departure_mode }}"
                    - condition: template
                      value_template: *activation_zone_in_condition
              then:
                - alias: Set lock action prefix
                  variables:
                    prefix: "{{ '' if departure_mode else 'un' }}"
                - alias: Do not lock if dont_lock_if_people_remaining is true and someone else is home
                  condition: template
                  value_template: >-
                    {{
                      prefix == 'un'
                      or not dont_lock_if_people_remaining
                      or not expand(gate_location)
                        | map(attribute='entity_id')
                        | list
                        | difference([driver])
                    }}
                - alias: If locking action is enabled
                  if:
                    - condition: template
                      value_template: "{{ prefix ~ 'lock' in security_features }}"
                  then:
                    - alias: For each lock
                      repeat:
                        for_each: !input locks
                        sequence:
                          - alias: Unlock or lock the lock
                            action: "lock.{{ prefix }}lock"
                            target:
                              entity_id: "{{ repeat.item }}"
                            continue_on_error: true
                - alias: If door unlatching is enabled
                  if:
                    - condition: template
                      value_template: "{{ prefix == 'un' and 'unlatch' in security_features }}"
                  then:
                    - alias: For each lock
                      repeat:
                        for_each: !input locks
                        sequence:
                          - alias: If the door supports unlatching
                            if:
                              - condition: template
                                value_template: >-
                                  {% set features = state_attr(repeat.item, 'supported_features')%}
                                  {{
                                    (0 if features is none else features)
                                    | bitwise_and(1) == 1
                                  }}
                            then:
                              - alias: Unlatch the door
                                action: lock.open
                                target:
                                  entity_id: "{{ repeat.item }}"
                                continue_on_error: true
                - alias: Set the alarm action
                  variables:
                    action: >-
                      {% if alarm != '' %}
                        {%
                          set features = (
                            state_attr(alarm, 'supported_features')
                          )
                        %}
                        {% set state = states(alarm) %}
                        {% if prefix == '' and 'arm' in security_features %}
                          {%
                            if state not in ['armed_away', 'armed_vacation']
                            and (
                              (0 if features is none else features)
                              | bitwise_and(2) == 2
                            )
                          %}
                            alarm_arm_away
                          {% else %}
                            {{ none }}
                          {% endif %}
                        {% elif 'disarm' in security_features %}
                          {%
                            if state not in [
                              'disarmed',
                              'armed_home',
                              'armed_custom_bypass'
                            ] + (
                              ['armed_night'] if 'night' in security_features else []
                            )
                          %}
                            {% set start = today_at('20:00') %}
                            {% set end = today_at('4:00') %}
                            {% set time = now() %}
                            {%
                              if features | bitwise_and(4) == 4
                              and 'night' in security_features
                              and (
                                start <= end and start <= time <= end
                                or start > end and (time >= start or time <= end)
                              )
                            %}
                              alarm_arm_night
                            {% elif features | bitwise_and(1) == 1 %}
                              alarm_arm_home
                            {% else %}
                              alarm_disarm
                            {% endif %}
                          {% else %}
                            {{ none }}
                          {% endif %}
                        {% else %}
                          {{ none }}
                        {% endif %}
                      {% else %}
                        {{ none }}
                      {% endif %}
                - alias: Only continue if the alarm needs to be called
                  condition: template
                  value_template: "{{ action is not none }}"
                - alias: (Un)arm the alarm
                  action: "alarm_control_panel.{{ action }}"
                  target:
                    entity_id: "{{ alarm }}"
                  data: >-
                    {{ {} if alarm_code == '' else {'code': alarm_code} }}
                  continue_on_error: true
            - alias: Reset the itinerary status
              variables: *reset_itinerary
            - alias: Save the itinerary status
              action: input_text.set_value
              target:
                entity_id: "{{ itinerary_sensor }}"
              data:
                value: "{{ itinerary_value | to_json }}"
            - alias: If the driver was leaving home
              if:
                - condition: template
                  value_template: "{{ departure_mode }}"
              then:
                - alias: Wait for driver to travel 250m away from activation zone, then return, to start itinerary
                  repeat:
                    count: 2
                    sequence:
                      - wait_for_trigger:
                          - alias: Vehicle stopped
                            trigger: template
                            id: vehicle_stopped
                            value_template: "{{ is_state(driving_sensor, 'off') }}"
                          - alias: Driver drove 250m away
                            trigger: template
                            value_template: >-
                              {% if state_attr(driver, 'gps_accuracy') is none %}
                                {% set accuracy = 100 %}
                              {% else %}
                                {% set accuracy = state_attr(driver, 'gps_accuracy') %}
                              {% endif %}
                              {% set gate_distance = distance(driver, gate_location)*1000 - accuracy %}

                              {{ gate_distance > activation_zone + 250 }}
                          - alias: Driver returned to the activation zone
                            trigger: template
                            value_template: >-
                              {% if state_attr(driver, 'gps_accuracy') is none %}
                                {% set accuracy = 100 %}
                              {% else %}
                                {% set accuracy = state_attr(driver, 'gps_accuracy') %}
                              {% endif %}
                              {% set gate_distance = distance(driver, gate_location)*1000 + accuracy %}

                              {{ gate_distance < activation_zone }}
                      - alias: Don't continue if driver stopped vehicle
                        if:
                          - condition: template
                            value_template: "{{ wait.trigger.id == 'vehicle_stopped' }}"
                        then:
                          - stop: Arrived to destination
      - alias: Mark the automation as not failed
        variables:
          errored: false
    continue_on_error: true
  - alias: Only continue if the automation errored out
    condition: template
    value_template: "{{ errored }}"
  - alias: Set message id
    variables:
      message: fatal_error
      message_id: fatal_error
  - alias: Get message translation
    variables:
      message: *get_message
    continue_on_error: true
  - alias: Notify of the issue on the dashboard
    action: persistent_notification.create
    data:
      title: "{{ blueprint_name }}"
      message: "{{ message }}"
    continue_on_error: true
  - alias: Notify the driver of the issue
    sequence:
      - if:
          - condition: template
            value_template: >-
              {{
                notify_service is defined
                and notify_service is not none
              }}
        then:
          - action: "{{ notify_service }}"
            data:
              title: "{{ blueprint_name }}"
              message: "{{ message }}"
              data:
                <<: *notification_data
                notification_icon: mdi:alert
    continue_on_error: true
  - alias: Restore itinerary sensor
    sequence:
      - if:
          - condition: template
            value_template: "{{ itinerary_sensor is defined }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: "{{ itinerary_sensor }}"
            data:
              value: "{{ default_itinerary_sensor_value | to_json }}"
    continue_on_error: true
  - alias: Restore iBeacons
    sequence:
      - if:
          - condition: template
            value_template: "{{ ble_started is defined }}"
        then:
          - sequence: *restore_ble
    continue_on_error: true
  - stop: Fatal error
    error: true
# Run in parralel to let the automation start with multiple users driving simultaneously
mode: parallel
max: 10
